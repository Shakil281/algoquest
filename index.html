<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #07070f; color: #e0e0e0; font-family: 'Courier New', monospace; min-height: 100vh; overflow-x: hidden; }
    body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,128,0.012) 2px, rgba(0,255,128,0.012) 4px); pointer-events: none; z-index: 9999; }

    /* MENU */
    .menu-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 48px; padding: 24px; }
    .game-title { font-family: 'Press Start 2P', cursive; font-size: clamp(20px, 5vw, 44px); color: #00ff88; text-shadow: 0 0 20px #00ff88, 0 0 50px #00ff8866; text-align: center; animation: glow 2.5s ease-in-out infinite; }

    .level-icon { font-size: 40px; margin-bottom: 14px; }

    /* SHARED */

    .game-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; }

    .back-btn:hover { border-color: #00ff88; color: #00ff88; }
    .section-title { font-family: 'Press Start 2P', cursive; font-size: clamp(9px, 1.8vw, 14px); color: #00ffff; text-shadow: 0 0 8px #00ffff66; }
    .mute-btn { background: #13132a; border: 1px solid #333; color: #888; padding: 7px 14px; cursor: pointer; font-size: 14px; transition: all 0.2s; border-radius: 4px; margin-left: auto; }
    .mute-btn:hover { border-color: #00ff88; }
    .mute-btn.muted { border-color: #ff3355; color: #ff3355; }
    .btn { padding: 9px 18px; border: none; cursor: pointer; font-family: 'Press Start 2P', cursive; font-size: 7px; transition: all 0.18s; border-radius: 4px; }
    .btn-green { background: #00ff88; color: #000; } .btn-green:hover { background: #33ffaa; box-shadow: 0 0 12px #00ff88; }
    .btn-cyan  { background: #00ffff; color: #000; } .btn-cyan:hover  { background: #55ffff; box-shadow: 0 0 12px #00ffff; }
    .btn-red   { background: #ff3355; color: #fff; } .btn-red:hover   { background: #ff5577; box-shadow: 0 0 12px #ff3355; }
    .btn-gray  { background: #1e1e32; color: #888; border: 1px solid #333; } .btn-gray:hover { background: #2a2a42; color: #ccc; }

    .algo-btn.active { border-color: #00ff88; color: #00ff88; background: #00ff8812; }

    .monster-card:active { cursor: grabbing; }
    .monster-card.comparing { border-color: #3377ff; box-shadow: 0 0 14px #3377ff88; }
    .monster-card.swapping  { border-color: #ff3344; box-shadow: 0 0 14px #ff334488; animation: shake 0.25s; }

    .monster-card.hint      { border-color: #ffdd00; box-shadow: 0 0 18px #ffdd00bb; animation: hintPulse 0.9s ease-in-out infinite; }
    .monster-card.dragging  { opacity: 0.4; transform: scale(0.92); cursor: grabbing; }
    .monster-card.drag-over { border-color: #ff00cc; box-shadow: 0 0 20px #ff00cc88; transform: scale(1.07); }
    .monster-card.all-done  { border-color: #00ff88; box-shadow: 0 0 12px #00ff8855; }
    @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    @keyframes hintPulse { 0%,100% { box-shadow: 0 0 14px #ffdd0088; } 50% { box-shadow: 0 0 30px #ffdd00cc; } }
    .monster-emoji { font-size: 28px; margin-bottom: 6px; pointer-events: none; }
    .monster-name  { font-size: 6px; color: #555; margin-bottom: 4px; font-family: 'Press Start 2P', cursive; pointer-events: none; }
    .monster-hp    { font-family: 'Press Start 2P', cursive; font-size: 12px; color: #ddd; margin-bottom: 6px; pointer-events: none; }
    .hp-bar  { height: 4px; background: #1e1e2e; border-radius: 3px; overflow: hidden; pointer-events: none; }

    /* COMBO */
    .combo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; min-height: 34px; }

    /* SIDE PANEL */
    .side-panel { display: flex; flex-direction: column; gap: 14px; }

    .complexity-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; margin-top: 6px; }
    .complexity-badge.bad  { background: #ff334420; color: #ff5566; border: 1px solid #ff3344; }

    /* RESULTS */
    .results-overlay { position: fixed; inset: 0; background: rgba(7,7,15,0.9); display: flex; align-items: center; justify-content: center; z-index: 200; }
    .results-card { background: #0b0b18; border: 2px solid #00ff88; border-radius: 14px; padding: 40px 36px; text-align: center; max-width: 440px; width: 90%; box-shadow: 0 0 60px #00ff8830; }
    .results-title { font-family: 'Press Start 2P', cursive; font-size: 15px; color: #00ff88; margin-bottom: 20px; }

    .star.lit  { filter: drop-shadow(0 0 10px #ffdd00); }
    .star.dark { filter: grayscale(1) brightness(0.25); }

    /* PATH */
    .path-layout { display: grid; grid-template-columns: 1fr 270px; gap: 20px; }
    @media (max-width: 860px) { .path-layout { grid-template-columns: 1fr; } }
    .dungeon-area { background: #0b0b18; border: 1px solid #00ff8820; border-radius: 8px; padding: 16px; }
    .dungeon-grid { display: inline-grid; gap: 1px; background: #0d0d1a; border: 1px solid #1a1a2a; cursor: crosshair; user-select: none; }

    .cell-empty   { background: #0e0e1e; } .cell-empty:hover { background: #1a1a2e; }
    .cell-wall    { background: #1e1e1e; border: 1px solid #2a2a2a; }
    .cell-start   { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
    .cell-end     { background: #ff3355; box-shadow: 0 0 6px #ff3355; }
    .cell-open    { background: #1133cc99; }
    .cell-closed  { background: #1a1a36; }
    .cell-path    { background: #00ffff; box-shadow: 0 0 5px #00ffff99; }
    .cell-current { background: #ffdd00; box-shadow: 0 0 8px #ffdd0099; }
    .tool-select { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .tool-btn { padding: 6px 13px; border: 1px solid #333; background: #0e0e1e; color: #666; cursor: pointer; font-size: 10px; transition: all 0.18s; border-radius: 4px; }
    .tool-btn.active { border-color: #00ffff; color: #00ffff; background: #00ffff12; }
    .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #777; }
    .legend-dot { width: 13px; height: 13px; border-radius: 2px; flex-shrink: 0; }
    .queue-panel { max-height: 180px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #00ff88 #111; }
    .queue-item { display: flex; justify-content: space-between; padding: 4px 8px; border-bottom: 1px solid #1a1a2e; font-size: 10px; font-family: 'Courier New', monospace; }
    .queue-item:first-child { background: #00ff8812; color: #00ff88; }
    .queue-item .q-pos { color: #00ffff; } .queue-item .q-f { color: #ff00cc; } .queue-item .q-g { color: #ffdd00; }
  </style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── SOUND ENGINE (Web Audio API — no external files) ──────────────────────
let _audioCtx = null;
let _muted = localStorage.getItem('algoquest_muted') === 'true';

function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

function tone(freq, type, duration, vol = 0.22, delay = 0) {
  if (_muted) return;
  try {
    const ac = getAudioCtx();
    const osc  = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ac.currentTime + delay);
    gain.gain.setValueAtTime(vol, ac.currentTime + delay);
    gain.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + delay + duration);
    osc.start(ac.currentTime + delay);
    osc.stop(ac.currentTime + delay + duration + 0.01);
  } catch(e) {}
}

const SFX = {
  click:    () => { tone(900, 'square',   0.05, 0.12); },
  swap:     () => { tone(440, 'square',   0.07, 0.18); tone(330, 'square', 0.07, 0.18, 0.08); },
  compare:  () => { tone(700, 'square',   0.03, 0.06); },
  wall:     () => { tone(120, 'square',   0.06, 0.12); },
  hint:     () => { tone(1047,'sine',     0.08, 0.12); },
  combo: (n) => {
    const notes = [523, 659, 784, 1047, 1319];
    const count = Math.min(n, notes.length);
    for (let i = 0; i < count; i++) tone(notes[i], 'square', 0.1, 0.2, i * 0.09);
  },
  sorted: () => {
    const seq = [[523,0],[659,0.1],[784,0.2],[1047,0.32],[784,0.46],[1047,0.56],[1319,0.68]];
    seq.forEach(([f,d]) => tone(f, 'square', 0.18, 0.22, d));
  },
  star: (n) => {
    const notes = [1047, 1319, 1568];
    for (let i = 0; i < n; i++) tone(notes[i], 'sine', 0.18, 0.2, i * 0.15);
  },
  pathFound: () => {
    [[440,0],[554,0.14],[659,0.28],[880,0.42]].forEach(([f,d]) => tone(f,'sine',0.22,0.2,d));
  },
  noPath: () => { tone(220,'sawtooth',0.25,0.2); tone(165,'sawtooth',0.3,0.2,0.22); },
  back:   () => { tone(440,'square',0.06,0.12); tone(330,'square',0.06,0.12,0.07); },
  menuSelect: () => { tone(660,'square',0.05,0.15); tone(880,'square',0.1,0.2,0.06); },
};

function toggleMute() {
  _muted = !_muted;
  localStorage.setItem('algoquest_muted', _muted);
  return _muted;
}

// ── DATA ──────────────────────────────────────────────────────────────────
const MONSTERS = [
  { emoji: '🐲', name: 'DRAGON',  color: '#ff4455' },
  { emoji: '👹', name: 'OGRE',    color: '#ff8800' },
  { emoji: '🧟', name: 'ZOMBIE',  color: '#88bb00' },
  { emoji: '👻', name: 'GHOST',   color: '#8899ff' },
  { emoji: '🦇', name: 'BAT',     color: '#9955ff' },
  { emoji: '🕷️', name: 'SPIDER',  color: '#bb5500' },
  { emoji: '🐺', name: 'WOLF',    color: '#999999' },
  { emoji: '🦂', name: 'SCORP',   color: '#ffcc00' },
  { emoji: '🧌', name: 'TROLL',   color: '#66aa44' },
  { emoji: '💀', name: 'SKULL',   color: '#cc44cc' },
];

const LEVELS = {
  easy:   { count: 6,  label: 'EASY',   color: '#00ff88', icon: '🌱', desc: '6 monsters' },
  medium: { count: 8,  label: 'MEDIUM', color: '#ffdd00', icon: '⚔️',  desc: '8 monsters' },
  hard:   { count: 10, label: 'HARD',   color: '#ff3355', icon: '💀', desc: '10 monsters' },
};

const cloneArr = a => [...a];

function countInversions(arr) {
  let inv = 0;
  for (let i = 0; i < arr.length - 1; i++)
    for (let j = i + 1; j < arr.length; j++)
      if (arr[i] > arr[j]) inv++;
  return inv;
}
function getBubbleHint(arr) {
  for (let i = 0; i < arr.length - 1; i++) if (arr[i] > arr[i+1]) return [i, i+1];
  return null;
}
function isSorted(arr) { return arr.every((v,i) => i===0 || arr[i-1]<=v); }
function calcStars(ps, opt) { if(opt===0)return 3; const r=ps/opt; if(r<=1.3)return 3; if(r<=2.0)return 2; return 1; }

// ── SORTING STEP GENERATORS ───────────────────────────────────────────────
function generateBubbleSortSteps(arr) {
  const steps=[], a=cloneArr(arr), n=a.length, ss=new Set();
  for(let i=0;i<n-1;i++){
    for(let j=0;j<n-i-1;j++){
      steps.push({arr:cloneArr(a),comparing:[j,j+1],swapping:[],sorted:[...ss],pivot:-1,pseudoLine:2});
      if(a[j]>a[j+1]){[a[j],a[j+1]]=[a[j+1],a[j]];steps.push({arr:cloneArr(a),comparing:[],swapping:[j,j+1],sorted:[...ss],pivot:-1,pseudoLine:4});}
    }
    ss.add(n-1-i);steps.push({arr:cloneArr(a),comparing:[],swapping:[],sorted:[...ss],pivot:-1,pseudoLine:1});
  }
  ss.add(0);steps.push({arr:cloneArr(a),comparing:[],swapping:[],sorted:[...ss],pivot:-1,pseudoLine:5});
  return steps;
}
function generateQuickSortSteps(arr) {
  const steps=[], a=cloneArr(arr), ss=new Set();
  function partition(lo,hi){
    let i=lo-1;steps.push({arr:cloneArr(a),comparing:[],swapping:[],sorted:[...ss],pivot:hi,pseudoLine:0});
    for(let j=lo;j<hi;j++){steps.push({arr:cloneArr(a),comparing:[j,hi],swapping:[],sorted:[...ss],pivot:hi,pseudoLine:2});if(a[j]<=a[hi]){i++;if(i!==j){[a[i],a[j]]=[a[j],a[i]];steps.push({arr:cloneArr(a),comparing:[],swapping:[i,j],sorted:[...ss],pivot:hi,pseudoLine:4});}}}
    [a[i+1],a[hi]]=[a[hi],a[i+1]];ss.add(i+1);steps.push({arr:cloneArr(a),comparing:[],swapping:[i+1,hi],sorted:[...ss],pivot:i+1,pseudoLine:5});return i+1;
  }
  function qs(lo,hi){if(lo<hi){const pi=partition(lo,hi);qs(lo,pi-1);qs(pi+1,hi);}else if(lo===hi){ss.add(lo);steps.push({arr:cloneArr(a),comparing:[],swapping:[],sorted:[...ss],pivot:-1,pseudoLine:6});}}
  qs(0,a.length-1);steps.push({arr:cloneArr(a),comparing:[],swapping:[],sorted:a.map((_,i)=>i),pivot:-1,pseudoLine:6});
  return steps;
}
function generateMergeSortSteps(arr) {
  const steps=[], a=cloneArr(arr);
  function merge(l,m,r){
    const left=a.slice(l,m+1),right=a.slice(m+1,r+1);let i=0,j=0,k=l;
    steps.push({arr:cloneArr(a),comparing:[],swapping:[],sorted:[],pivot:-1,pseudoLine:3,mergeRange:[l,r]});
    while(i<left.length&&j<right.length){steps.push({arr:cloneArr(a),comparing:[l+i,m+1+j],swapping:[],sorted:[],pivot:-1,pseudoLine:4,mergeRange:[l,r]});if(left[i]<=right[j])a[k++]=left[i++];else a[k++]=right[j++];steps.push({arr:cloneArr(a),comparing:[],swapping:[k-1],sorted:[],pivot:-1,pseudoLine:5,mergeRange:[l,r]});}
    while(i<left.length)a[k++]=left[i++];while(j<right.length)a[k++]=right[j++];
    steps.push({arr:cloneArr(a),comparing:[],swapping:[],sorted:[],pivot:-1,pseudoLine:6,mergeRange:[l,r]});
  }
  function ms(l,r){if(l<r){const m=Math.floor((l+r)/2);steps.push({arr:cloneArr(a),comparing:[],swapping:[],sorted:[],pivot:-1,pseudoLine:0,mergeRange:[l,r]});ms(l,m);ms(m+1,r);merge(l,m,r);}}
  ms(0,a.length-1);steps.push({arr:cloneArr(a),comparing:[],swapping:[],sorted:a.map((_,i)=>i),pivot:-1,pseudoLine:7});
  return steps;
}

const PSEUDOCODES = {
  bubble: [{text:'for i = 0 to n-1:',indent:0},{text:'for j = 0 to n-i-2:',indent:1},{text:'compare arr[j], arr[j+1]',indent:2},{text:'if arr[j] > arr[j+1]:',indent:2},{text:'swap(arr[j], arr[j+1])',indent:3},{text:'// Sorted!  ✓',indent:0}],
  quick:  [{text:'pivot = arr[high]',indent:0},{text:'i = low - 1',indent:0},{text:'for j = low to high-1:',indent:0},{text:'if arr[j] <= pivot:',indent:1},{text:'swap(arr[++i], arr[j])',indent:2},{text:'swap(arr[i+1], pivot) → placed!',indent:1},{text:'recurse left & right halves',indent:0},{text:'// Sorted!  ✓',indent:0}],
  merge:  [{text:'mergesort(l, r):',indent:0},{text:'if l < r:',indent:1},{text:'m = (l + r) / 2',indent:2},{text:'merge(l, m, r) →',indent:1},{text:'compare left[i] vs right[j]',indent:2},{text:'place smaller element',indent:3},{text:'copy remaining elements',indent:2},{text:'// Sorted!  ✓',indent:0}],
};
const COMPLEXITIES = {
  bubble:{time:'O(n²)',space:'O(1)',badge:'bad'},
  quick: {time:'O(n log n)',space:'O(log n)',badge:'mid'},
  merge: {time:'O(n log n)',space:'O(n)',badge:'mid'},
};

// ── PATHFINDING ───────────────────────────────────────────────────────────
const ROWS=18, COLS=24;
const createGrid = () => Array.from({length:ROWS},(_,r)=>Array.from({length:COLS},(_,c)=>({r,c,wall:false})));
function generateMaze() {
  const g=createGrid();
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(Math.random()<0.28)g[r][c].wall=true;
  [[1,1],[1,2],[2,1],[ROWS-2,COLS-2],[ROWS-2,COLS-3],[ROWS-3,COLS-2]].forEach(([r,c])=>{if(r>=0&&r<ROWS&&c>=0&&c<COLS)g[r][c].wall=false;});
  return g;
}
function manhattan(r1,c1,r2,c2){return Math.abs(r1-r2)+Math.abs(c1-c2);}
function runPathfinding(grid,start,end,astar){
  const frames=[],dist=Array.from({length:ROWS},()=>Array(COLS).fill(Infinity)),prev=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  dist[start[0]][start[1]]=0;
  let open=[{r:start[0],c:start[1],g:0,f:0}];
  const visited=new Set(),openSet=new Set([`${start[0]},${start[1]}`]);
  while(open.length>0){
    open.sort((a,b)=>a.f-b.f);const curr=open.shift(),key=`${curr.r},${curr.c}`;openSet.delete(key);
    if(visited.has(key))continue;visited.add(key);
    frames.push({visited:new Set(visited),open:new Set(openSet),current:[curr.r,curr.c],queue:open.slice(0,12).map(x=>({...x}))});
    if(curr.r===end[0]&&curr.c===end[1])break;
    for(const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]){
      const nr=curr.r+dr,nc=curr.c+dc;
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS||grid[nr][nc].wall)continue;
      const nk=`${nr},${nc}`;if(visited.has(nk))continue;
      const ng=curr.g+1;if(ng<dist[nr][nc]){dist[nr][nc]=ng;prev[nr][nc]=[curr.r,curr.c];const h=astar?manhattan(nr,nc,end[0],end[1]):0;openSet.add(nk);open.push({r:nr,c:nc,g:ng,f:ng+h});}
    }
  }
  const path=[];let cur=end;
  while(cur&&!(cur[0]===start[0]&&cur[1]===start[1])){path.unshift(cur);cur=prev[cur[0]][cur[1]];}
  if(cur)path.unshift(start);
  const found=path.length>1&&path[path.length-1][0]===end[0]&&path[path.length-1][1]===end[1];
  if(frames.length>0)frames[frames.length-1]={...frames[frames.length-1],path:found?path:[],found};
  return {frames,path:found?path:[],found};
}

// ── SORTING GAME ──────────────────────────────────────────────────────────
function SortingGame({levelKey,onBack,onMenu}) {
  const lv=LEVELS[levelKey], COUNT=lv.count;

  const makeMonsters = useCallback(()=>{
    const vals=Array.from({length:COUNT},()=>Math.floor(Math.random()*89)+10);
    let t=0;while(isSorted(vals)&&t++<30){const i=Math.floor(Math.random()*vals.length),j=Math.floor(Math.random()*vals.length);[vals[i],vals[j]]=[vals[j],vals[i]];}
    return vals.map((hp,i)=>({...MONSTERS[i%MONSTERS.length],hp}));
  },[COUNT]);

  const [gameMode,    setGameMode]    = useState('play');
  const [monsters,    setMonsters]    = useState(()=>makeMonsters());
  const [initSnap,    setInitSnap]    = useState(null);
  const [algo,        setAlgo]        = useState('bubble');
  const [steps,       setSteps]       = useState([]);
  const [stepIdx,     setStepIdx]     = useState(-1);
  const [isRunning,   setIsRunning]   = useState(false);
  const [speed,       setSpeed]       = useState(280);
  const [swapCount,   setSwapCount]   = useState(0);
  const [cmpCount,    setCmpCount]    = useState(0);
  const [message,     setMessage]     = useState('');
  const [drag,        setDrag]        = useState({from:-1,to:-1});
  const [playerSwaps, setPlayerSwaps] = useState(0);
  const [combo,       setCombo]       = useState(0);
  const [optInv,      setOptInv]      = useState(0);
  const [showResults, setShowResults] = useState(false);
  const [resultStars, setResultStars] = useState(0);
  const [showHint,    setShowHint]    = useState(true);
  const timerRef = useRef(null);
  const stateRef = useRef({monsters,playerSwaps,optInv,drag});
  const prevStepRef = useRef(null);

  useEffect(()=>{ stateRef.current={monsters,playerSwaps,optInv,drag}; },[monsters,playerSwaps,optInv,drag]);

  useEffect(()=>{
    const snap=monsters.map(m=>({...m}));
    setInitSnap(snap); setOptInv(countInversions(snap.map(m=>m.hp)));
  },[]); // eslint-disable-line

  const currentStep=stepIdx>=0&&stepIdx<steps.length?steps[stepIdx]:null;
  const displayArr=currentStep?currentStep.arr.map((hp,i)=>({...MONSTERS[i%MONSTERS.length],hp})):monsters;
  const maxHp=Math.max(...displayArr.map(m=>m.hp),1);

  // Play sound on each watch-mode step change
  useEffect(()=>{
    if(gameMode!=='watch'||!currentStep)return;
    const prev=prevStepRef.current;
    prevStepRef.current=currentStep;
    if(!prev)return;
    if(currentStep.swapping&&currentStep.swapping.length) SFX.swap();
    else if(currentStep.comparing&&currentStep.comparing.length) SFX.compare();
  },[currentStep,gameMode]);

  const cardClass = idx => {
    if(gameMode==='play'){
      if(drag.from===idx)return'dragging';
      if(drag.from!==-1&&drag.to===idx)return'drag-over';
      if(isSorted(monsters.map(m=>m.hp)))return'all-done';
      const h=showHint?getBubbleHint(monsters.map(m=>m.hp)):null;
      if(h&&(h[0]===idx||h[1]===idx))return'hint';
      return'';
    }
    if(!currentStep)return'';
    const{comparing,swapping,sorted,pivot,mergeRange}=currentStep;
    if(sorted&&sorted.includes(idx))return'sorted';
    if(swapping&&swapping.includes(idx))return'swapping';
    if(comparing&&comparing.includes(idx))return'comparing';
    if(pivot===idx)return'pivot';
    if(mergeRange&&idx>=mergeRange[0]&&idx<=mergeRange[1])return'merging';
    return'';
  };

  const genSteps=useCallback((mon,algoName)=>{
    const arr=mon.map(m=>m.hp);
    if(algoName==='bubble')return generateBubbleSortSteps(arr);
    if(algoName==='quick') return generateQuickSortSteps(arr);
    return generateMergeSortSteps(arr);
  },[]);

  const stopWatch=useCallback(()=>{
    setIsRunning(false);if(timerRef.current){clearTimeout(timerRef.current);timerRef.current=null;}
  },[]);

  const resetWatch=()=>{stopWatch();setStepIdx(-1);setSteps([]);setSwapCount(0);setCmpCount(0);setMessage('');prevStepRef.current=null;};
  const handleAlgoChange=a=>{SFX.click();stopWatch();setAlgo(a);setStepIdx(-1);setSteps([]);setSwapCount(0);setCmpCount(0);setMessage('');prevStepRef.current=null;};

  const handleShuffle=()=>{
    const m=makeMonsters();SFX.click();stopWatch();
    setMonsters(m);setInitSnap(m.map(x=>({...x})));setOptInv(countInversions(m.map(x=>x.hp)));
    setStepIdx(-1);setSteps([]);setSwapCount(0);setCmpCount(0);setPlayerSwaps(0);setCombo(0);setMessage('');setShowResults(false);prevStepRef.current=null;
  };

  const handleRetry=()=>{
    if(!initSnap)return;SFX.click();
    setMonsters(initSnap.map(x=>({...x})));setPlayerSwaps(0);setCombo(0);setShowResults(false);setMessage('');
  };

  const handleRun=()=>{
    SFX.click();let s=steps;if(!s.length){s=genSteps(monsters,algo);setSteps(s);}
    setIsRunning(true);setStepIdx(p=>p<0?0:p);
  };

  const handleStepFwd=()=>{
    let s=steps;if(!s.length){s=genSteps(monsters,algo);setSteps(s);}
    setStepIdx(prev=>{
      const next=Math.min(prev+1,s.length-1);
      if(s[next]){if(s[next].swapping&&s[next].swapping.length)setSwapCount(c=>c+1);if(s[next].comparing&&s[next].comparing.length)setCmpCount(c=>c+1);}
      return next;
    });
  };
  const handleStepBck=()=>{SFX.click();setStepIdx(p=>Math.max(p-1,0));};

  const handleDragStart=idx=>{if(showResults||isSorted(monsters.map(m=>m.hp)))return;setDrag({from:idx,to:-1});};
  const handleDragEnter=idx=>{if(drag.from===-1||drag.from===idx)return;setDrag(d=>({...d,to:idx}));};

  const commitSwap=useCallback(()=>{
    const{monsters:m,playerSwaps:ps,optInv:oi,drag:d}=stateRef.current;
    setDrag({from:-1,to:-1});
    if(d.from===-1||d.to===-1||d.from===d.to)return;
    const hint=getBubbleHint(m.map(x=>x.hp));
    const isOpt=hint&&((d.from===hint[0]&&d.to===hint[1])||(d.from===hint[1]&&d.to===hint[0]));
    const nm=[...m];[nm[d.from],nm[d.to]]=[nm[d.to],nm[d.from]];
    setMonsters(nm);
    const ns=ps+1;setPlayerSwaps(ns);
    const newCombo=isOpt?stateRef.current.combo+1:0;
    setCombo(newCombo);
    SFX.swap();
    if(isOpt&&newCombo>1) SFX.combo(newCombo);
    if(isSorted(nm.map(x=>x.hp))){SFX.sorted();setResultStars(calcStars(ns,oi));setTimeout(()=>setShowResults(true),600);}
  },[]);

  useEffect(()=>{
    const up=()=>{if(stateRef.current.drag.from!==-1)commitSwap();};
    window.addEventListener('mouseup',up);return()=>window.removeEventListener('mouseup',up);
  },[commitSwap]);

  // auto-advance watch mode
  useEffect(()=>{
    if(gameMode!=='watch'||!isRunning||!steps.length)return;
    if(stepIdx>=steps.length-1){setIsRunning(false);setMessage('SORTED! Algorithm complete  ✓');SFX.sorted();return;}
    timerRef.current=setTimeout(()=>{
      setStepIdx(prev=>{
        const next=prev+1;
        if(steps[next]){if(steps[next].swapping&&steps[next].swapping.length)setSwapCount(c=>c+1);if(steps[next].comparing&&steps[next].comparing.length)setCmpCount(c=>c+1);}
        return next;
      });
    },speed);
    return()=>clearTimeout(timerRef.current);
  },[gameMode,isRunning,stepIdx,steps,speed]);

  const handleModeSwitch=m=>{
    SFX.click();stopWatch();setGameMode(m);setStepIdx(-1);setSteps([]);setSwapCount(0);setCmpCount(0);setMessage('');prevStepRef.current=null;
    if(m==='play'&&initSnap){setMonsters(initSnap.map(x=>({...x})));setPlayerSwaps(0);setCombo(0);setShowResults(false);}
  };

  const pseudo=PSEUDOCODES[algo],complexity=COMPLEXITIES[algo],activeLine=currentStep?currentStep.pseudoLine:-1;
  const hint=gameMode==='play'&&showHint?getBubbleHint(monsters.map(m=>m.hp)):null;
  const sorted=isSorted(monsters.map(m=>m.hp));

  return (
    <div className="game-container">
      {showResults&&<ResultsOverlay stars={resultStars} playerSwaps={playerSwaps} optimalSwaps={optInv} onRetry={handleRetry} onMenu={onMenu}/>}
      <div className="game-header">
        <button className="back-btn" onClick={()=>{SFX.back();onBack();}}>← BACK</button>
        <span className="section-title">👾 MONSTER SORTER</span>
        <span style={{fontSize:8,color:lv.color,fontFamily:"'Press Start 2P',cursive"}}>{lv.label}</span>
        <MuteBtn/>
      </div>

      <div className="mode-tabs">
        <button className={`mode-tab ${gameMode==='play'?'active':''}`} onClick={()=>handleModeSwitch('play')}>🎮 PLAY</button>
        <button className={`mode-tab ${gameMode==='watch'?'active':''}`} onClick={()=>handleModeSwitch('watch')}>👁 WATCH</button>
      </div>

      <div className="sort-layout">
        <div>
          {gameMode==='watch'&&(
            <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
              {[['bubble','🫧 BUBBLE'],['quick','⚡ QUICK'],['merge','🔀 MERGE']].map(([a,label])=>(
                <button key={a} className={`algo-btn ${algo===a?'active':''}`} onClick={()=>handleAlgoChange(a)}>{label}</button>
              ))}
            </div>
          )}

          <div className="monster-arena">
            {gameMode==='play'&&(
              <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8,flexWrap:'wrap'}}>
                <button className={`algo-btn ${showHint?'active':''}`} onClick={()=>{SFX.click();setShowHint(h=>!h);}}>💡 HINT {showHint?'ON':'OFF'}</button>
                {hint&&<span style={{fontSize:9,color:'#ffdd00',fontFamily:"'Press Start 2P',cursive"}}>Swap the glowing pair!</span>}
                {sorted&&<span style={{fontSize:9,color:'#00ff88',fontFamily:"'Press Start 2P',cursive"}}>SORTED ✓</span>}
              </div>
            )}

            {gameMode==='play'&&combo>1&&(
              <div className="combo-row">
                <span className="combo-num" key={combo}>x{combo}</span>
                <span className="combo-label">COMBO!</span>
              </div>
            )}

            <div className="monster-row" onMouseLeave={()=>drag.from!==-1&&setDrag(d=>({...d,to:-1}))}>
              {displayArr.map((m,idx)=>(
                <div key={idx} className={`monster-card ${cardClass(idx)}`}
                  style={{height:`${100+Math.round((m.hp/maxHp)*80)}px`}}
                  onMouseDown={()=>gameMode==='play'&&handleDragStart(idx)}
                  onMouseEnter={()=>gameMode==='play'&&handleDragEnter(idx)}
                >
                  <div className="monster-emoji">{m.emoji}</div>
                  <div className="monster-name">{m.name}</div>
                  <div className="monster-hp">{m.hp}</div>
                  <div className="hp-bar"><div className="hp-fill" style={{width:`${(m.hp/maxHp)*100}%`,background:m.color}}/></div>
                </div>
              ))}
            </div>

            {message&&<div className={`message ${message.includes('SORTED')?'success':'info'}`}>{message}</div>}

            {gameMode==='watch'?(
              <>
                <div className="controls-bar">
                  <button className="btn btn-green" onClick={handleRun}     disabled={isRunning}>▶ RUN</button>
                  <button className="btn btn-gray"  onClick={stopWatch}     disabled={!isRunning}>⏸ PAUSE</button>
                  <button className="btn btn-gray"  onClick={handleStepBck} disabled={isRunning||stepIdx<=0}>◀ STEP</button>
                  <button className="btn btn-gray"  onClick={handleStepFwd} disabled={isRunning}>STEP ▶</button>
                  <button className="btn btn-cyan"  onClick={handleShuffle}>🔀 SHUFFLE</button>
                  <button className="btn btn-red"   onClick={resetWatch}>↺ RESET</button>
                  <div className="speed-control">
                    <span>FAST</span>
                    <input type="range" min={40} max={800} value={speed} onChange={e=>setSpeed(+e.target.value)} style={{transform:'scaleX(-1)'}}/>
                    <span>SLOW</span>
                  </div>
                </div>
                <div className="stats-bar">
                  <div className="stat-item"><div className="stat-label">CMP</div><div className="stat-value" style={{color:'#3377ff'}}>{cmpCount}</div></div>
                  <div className="stat-item"><div className="stat-label">SWAP</div><div className="stat-value" style={{color:'#ff3355'}}>{swapCount}</div></div>
                  <div className="stat-item"><div className="stat-label">STEP</div><div className="stat-value" style={{color:'#ffdd00',fontSize:14}}>{stepIdx<0?0:stepIdx}<span style={{fontSize:8,color:'#333'}}>/{steps.length}</span></div></div>
                </div>
              </>
            ):(
              <div className="controls-bar">
                <button className="btn btn-cyan" onClick={handleShuffle}>🔀 NEW MONSTERS</button>
                <button className="btn btn-gray" onClick={handleRetry}>↺ RETRY</button>
                <div className="stats-bar" style={{marginLeft:4}}>
                  <div className="stat-item"><div className="stat-label">SWAPS</div><div className="stat-value" style={{color:'#ff3355'}}>{playerSwaps}</div></div>
                  <div className="stat-item"><div className="stat-label">PAR</div><div className="stat-value" style={{color:'#ffdd00'}}>{optInv}</div></div>
                  <div className="stat-item"><div className="stat-label">COMBO</div><div className="stat-value" style={{color:'#ff00cc'}}>{combo}</div></div>
                </div>
              </div>
            )}
          </div>
          {gameMode==='play'&&!sorted&&(
            <div style={{marginTop:8,fontSize:11,color:'#333',fontFamily:'Courier New'}}>
              💡 Drag monsters to sort low → high HP. Yellow glow = optimal next swap. Match hints to build COMBO!
            </div>
          )}
        </div>

        <div className="side-panel">
          {gameMode==='watch'?(
            <>
              <div className="panel-box">
                <div className="panel-title">📄 PSEUDOCODE</div>
                <div className="pseudo-code">
                  {pseudo.map((line,i)=><div key={i} className={`pseudo-line indent${line.indent} ${activeLine===i?'active':''}`}>{line.text}</div>)}
                </div>
              </div>
              <div className="panel-box">
                <div className="panel-title">⚡ COMPLEXITY</div>
                <div style={{fontSize:12,color:'#888',lineHeight:2}}>
                  <div>Time:  <span style={{color:'#ddd'}}>{complexity.time}</span></div>
                  <div>Space: <span style={{color:'#ddd'}}>{complexity.space}</span></div>
                </div>
                <span className={`complexity-badge ${complexity.badge}`}>{complexity.time}</span>
              </div>
              <div className="panel-box">
                <div className="panel-title">🎨 LEGEND</div>
                <div style={{fontSize:11,lineHeight:2.2}}>
                  <div><span style={{color:'#3377ff'}}>■</span> Comparing</div>
                  <div><span style={{color:'#ff3344'}}>■</span> Swapping</div>
                  <div><span style={{color:'#ffdd00'}}>■</span> Pivot</div>
                  <div><span style={{color:'#ff7700'}}>■</span> Merge range</div>
                  <div><span style={{color:'#00ff88'}}>■</span> Sorted</div>
                </div>
              </div>
            </>
          ):(
            <>
              <div className="panel-box">
                <div className="panel-title">🎯 HOW TO PLAY</div>
                <div style={{fontSize:11,color:'#666',lineHeight:2.4}}>
                  <div>🖱 <span style={{color:'#aaa'}}>Drag</span> to swap monsters</div>
                  <div>💡 <span style={{color:'#ffdd00'}}>Yellow glow</span> = best move</div>
                  <div>🔥 Follow hints for <span style={{color:'#ff00cc'}}>COMBO!</span></div>
                  <div>⭐ Beat PAR for 3 stars</div>
                  <div>👁 WATCH tab = auto sort</div>
                </div>
              </div>
              <div className="panel-box">
                <div className="panel-title">💡 NEXT HINT</div>
                {hint?(
                  <div style={{fontSize:11,color:'#777',lineHeight:2}}>
                    <div style={{color:'#555',marginBottom:4}}>Swap these two:</div>
                    <div style={{color:'#ffdd00'}}>{monsters[hint[0]]?.emoji} <span style={{color:'#ddd'}}>{monsters[hint[0]]?.hp}</span> HP</div>
                    <div style={{color:'#444',fontSize:10}}>↕</div>
                    <div style={{color:'#ffdd00'}}>{monsters[hint[1]]?.emoji} <span style={{color:'#ddd'}}>{monsters[hint[1]]?.hp}</span> HP</div>
                  </div>
                ):(
                  <div style={{color:'#00ff88',fontSize:11}}>Already sorted! ✓</div>
                )}
              </div>
              <div className="panel-box">
                <div className="panel-title">📊 SCORE</div>
                <div style={{fontSize:11,color:'#777',lineHeight:2.2}}>
                  <div>Swaps made: <span style={{color:'#ddd'}}>{playerSwaps}</span></div>
                  <div>Par (optimal): <span style={{color:'#ffdd00'}}>{optInv}</span></div>
                  <div>Combo: <span style={{color:'#ff00cc'}}>{combo>0?`x${combo}`:'—'}</span></div>
                  <div>Level: <span style={{color:lv.color}}>{lv.label}</span></div>
                </div>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ── PATHFINDING GAME ──────────────────────────────────────────────────────
function PathfindingGame({onBack}) {
  const [grid,      setGrid]      = useState(generateMaze);
  const [start,     setStart]     = useState([1,1]);
  const [end,       setEnd]       = useState([ROWS-2,COLS-2]);
  const [algo,      setAlgo]      = useState('astar');
  const [tool,      setTool]      = useState('wall');
  const [isRunning, setIsRunning] = useState(false);
  const [speed,     setSpeed]     = useState(25);
  const [frames,    setFrames]    = useState([]);
  const [frameIdx,  setFrameIdx]  = useState(-1);
  const [result,    setResult]    = useState(null);
  const [mouseDown, setMouseDown] = useState(false);
  const [message,   setMessage]   = useState('');
  const timerRef = useRef(null);

  const frame=frameIdx>=0&&frameIdx<frames.length?frames[frameIdx]:null;

  const cellClass=(r,c)=>{
    if(r===start[0]&&c===start[1])return'cell-start';
    if(r===end[0]  &&c===end[1])  return'cell-end';
    if(grid[r][c].wall)           return'cell-wall';
    if(frame){
      const key=`${r},${c}`;
      if(frame.path&&frame.path.some(([pr,pc])=>pr===r&&pc===c))return'cell-path';
      if(frame.current&&frame.current[0]===r&&frame.current[1]===c)return'cell-current';
      if(frame.visited&&frame.visited.has(key))return'cell-closed';
      if(frame.open   &&frame.open.has(key))   return'cell-open';
    }
    return'cell-empty';
  };

  const resetViz=()=>{
    setIsRunning(false);if(timerRef.current){clearTimeout(timerRef.current);timerRef.current=null;}
    setFrames([]);setFrameIdx(-1);setResult(null);setMessage('');
  };

  const interact=(r,c)=>{
    if(isRunning)return;
    if(tool==='start'){setStart([r,c]);resetViz();return;}
    if(tool==='end')  {setEnd([r,c]);  resetViz();return;}
    if(r===start[0]&&c===start[1])return;
    if(r===end[0]  &&c===end[1])  return;
    const g=grid.map(row=>row.map(cell=>({...cell})));
    const wasWall=g[r][c].wall; g[r][c].wall=(tool==='wall');
    if(tool==='wall'&&!wasWall) SFX.wall();
    setGrid(g);resetViz();
  };

  const handleRun=()=>{
    SFX.click();resetViz();
    const{frames:f,path,found}=runPathfinding(grid,start,end,algo==='astar');
    setFrames(f);setResult({path,found});setFrameIdx(0);setIsRunning(true);
  };

  const handleNewMaze=()=>{SFX.click();resetViz();setGrid(generateMaze());setStart([1,1]);setEnd([ROWS-2,COLS-2]);};

  useEffect(()=>{
    if(!isRunning||!frames.length)return;
    if(frameIdx>=frames.length-1){
      setIsRunning(false);
      const found=result&&result.found;
      setMessage(found?'PATH FOUND!  ✓':'NO PATH EXISTS  ⛔');
      if(found) SFX.pathFound(); else SFX.noPath();
      return;
    }
    timerRef.current=setTimeout(()=>setFrameIdx(p=>p+1),speed);
    return()=>clearTimeout(timerRef.current);
  },[isRunning,frameIdx,frames,speed,result]);

  const visitedCount=frame?.visited?.size??0;
  const queueSize   =frame?.queue?.length??0;
  const pathLen     =(result?.found&&frameIdx>=frames.length-1)?result.path.length:0;

  return (
    <div className="game-container">
      <div className="game-header">
        <button className="back-btn" onClick={()=>{SFX.back();onBack();}}>← BACK</button>
        <span className="section-title">🗺 DUNGEON ESCAPE</span>
        <MuteBtn/>
      </div>
      <div className="path-layout">
        <div>
          <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
            {[['astar','⭐ A*'],['dijkstra','🔵 DIJKSTRA']].map(([a,label])=>(
              <button key={a} className={`algo-btn ${algo===a?'active':''}`} onClick={()=>{SFX.click();setAlgo(a);resetViz();}}>{label}</button>
            ))}
            <button className="btn btn-green" onClick={handleRun}              disabled={isRunning}>▶ RUN</button>
            <button className="btn btn-gray"  onClick={()=>{SFX.click();setIsRunning(false);}} disabled={!isRunning}>⏸ PAUSE</button>
            <button className="btn btn-cyan"  onClick={handleNewMaze}>🎲 NEW MAZE</button>
            <button className="btn btn-red"   onClick={()=>{SFX.click();resetViz();}}>↺ RESET</button>
          </div>

          <div className="tool-select">
            <span style={{fontSize:9,color:'#555',alignSelf:'center',fontFamily:"'Press Start 2P',cursive"}}>TOOL:</span>
            {[['wall','🧱 WALL'],['erase','🧹 ERASE'],['start','🟢 START'],['end','🔴 END']].map(([t,label])=>(
              <button key={t} className={`tool-btn ${tool===t?'active':''}`} onClick={()=>{SFX.click();setTool(t);}}>{label}</button>
            ))}
          </div>

          {message&&<div className={`message ${message.includes('FOUND')?'success':message.includes('NO')?'error':'info'}`}>{message}</div>}

          <div className="dungeon-area">
            <div className="dungeon-grid" style={{gridTemplateColumns:`repeat(${COLS},26px)`}} onMouseLeave={()=>setMouseDown(false)}>
              {grid.map((row,r)=>row.map((_,c)=>(
                <div key={`${r}-${c}`} className={`grid-cell ${cellClass(r,c)}`}
                  onMouseDown={()=>{setMouseDown(true);interact(r,c);}}
                  onMouseUp={()=>setMouseDown(false)}
                  onMouseEnter={()=>{if(mouseDown)interact(r,c);}}
                />
              )))}
            </div>
            <div className="legend">
              {[['#00ff88','Start'],['#ff3355','End'],['#1133cc99','Open'],['#1a1a36','Visited'],['#ffdd00','Current'],['#00ffff','Path'],['#1e1e1e','Wall']].map(([color,label])=>(
                <div key={label} className="legend-item">
                  <div className="legend-dot" style={{background:color,border:'1px solid #333'}}/>
                  <span>{label}</span>
                </div>
              ))}
            </div>
            <div className="stats-bar" style={{marginTop:12}}>
              <div className="stat-item"><div className="stat-label">VISITED</div><div className="stat-value" style={{color:'#3377ff'}}>{visitedCount}</div></div>
              <div className="stat-item"><div className="stat-label">QUEUE</div><div className="stat-value" style={{color:'#ff00cc'}}>{queueSize}</div></div>
              <div className="stat-item"><div className="stat-label">PATH</div><div className="stat-value" style={{color:'#00ff88'}}>{pathLen||'—'}</div></div>
              <div className="stat-item"><div className="stat-label">FRAME</div><div className="stat-value" style={{color:'#ffdd00',fontSize:13}}>{frameIdx<0?0:frameIdx}<span style={{fontSize:8,color:'#333'}}>/{frames.length}</span></div></div>
            </div>
            <div className="speed-control" style={{marginTop:12}}>
              <span>FAST</span>
              <input type="range" min={5} max={200} value={speed} onChange={e=>setSpeed(+e.target.value)} style={{transform:'scaleX(-1)',width:140}}/>
              <span>SLOW</span>
            </div>
          </div>
        </div>

        <div className="side-panel">
          <div className="panel-box">
            <div className="panel-title">📋 ALGORITHM</div>
            <div style={{fontSize:11,color:'#777',lineHeight:2}}>
              {algo==='astar'?(
                <>
                  <div style={{color:'#00ff88',marginBottom:6,fontFamily:"'Press Start 2P',cursive",fontSize:9}}>A* Search</div>
                  <div>f(n) = g(n) + h(n)</div>
                  <div style={{color:'#555'}}>g = cost from start</div>
                  <div style={{color:'#555'}}>h = Manhattan distance</div>
                  <div style={{marginTop:10,color:'#ffdd00'}}>Finds optimal path</div>
                  <div style={{color:'#555'}}>efficiently via heuristic</div>
                </>
              ):(
                <>
                  <div style={{color:'#00ffff',marginBottom:6,fontFamily:"'Press Start 2P',cursive",fontSize:9}}>Dijkstra</div>
                  <div>f(n) = g(n) + 0</div>
                  <div style={{color:'#555'}}>g = cost from start</div>
                  <div style={{color:'#555'}}>h = 0 (no heuristic)</div>
                  <div style={{marginTop:10,color:'#ffdd00'}}>Explores uniformly</div>
                  <div style={{color:'#555'}}>slower than A*</div>
                </>
              )}
            </div>
          </div>
          <div className="panel-box">
            <div className="panel-title">🔢 PRIORITY QUEUE</div>
            <div className="queue-panel">
              {frame?.queue?.length?frame.queue.map((item,i)=>(
                <div key={i} className="queue-item">
                  <span className="q-pos">[{item.r},{item.c}]</span>
                  <span className="q-f">f={item.f}</span>
                  <span className="q-g">g={item.g}</span>
                </div>
              )):<div style={{color:'#333',fontSize:10,padding:8}}>Run to see queue...</div>}
            </div>
          </div>
          <div className="panel-box">
            <div className="panel-title">💡 TIPS</div>
            <div style={{fontSize:10,color:'#555',lineHeight:2.3}}>
              <div>🖱 Click + drag to paint walls</div>
              <div>🟢 Move start/end points</div>
              <div>🔄 Compare A* vs Dijkstra</div>
              <div>⚡ A* visits far fewer nodes</div>
              <div>🎲 New Maze = new dungeon</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────
function App() {
  const [screen,   setScreen]   = useState('menu');
  const [levelKey, setLevelKey] = useState('medium');
  if(screen==='sort')  return <SortingGame levelKey={levelKey} onBack={()=>setScreen('level')} onMenu={()=>setScreen('menu')}/>;
  if(screen==='level') return <LevelSelect onSelect={k=>{setLevelKey(k);setScreen('sort');}} onBack={()=>setScreen('menu')}/>;
  if(screen==='path')  return <PathfindingGame onBack={()=>setScreen('menu')}/>;
  return <GameMenu onSelect={mode=>setScreen(mode==='sort'?'level':'path')}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
