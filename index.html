function SortingGame({levelKey,onBack,onMenu,initialMonsters,multiPlayers,multiPlayerIdx,onPlayerDone}){
  const lv=LEVELS[levelKey],COUNT=lv.count;
  const mkM=useCallback(()=>{if(initialMonsters)return initialMonsters.map(x=>({...x}));const v=Array.from({length:COUNT},()=>Math.floor(Math.random()*89)+10);let t=0;while(isSorted(v)&&t++<30){const i=Math.floor(Math.random()*COUNT),j=Math.floor(Math.random()*COUNT);[v[i],v[j]]=[v[j],v[i]];}return v.map((hp,i)=>({...MONSTERS[i%MONSTERS.length],hp}));},[COUNT,initialMonsters]);

  const[gameMode,setGameMode]=useState('play');
  const[monsters,setMonsters]=useState(()=>mkM());
  const[initSnap,setInitSnap]=useState(null);
  const[algo,setAlgo]=useState('bubble');
  const[steps,setSteps]=useState([]);
  const[stepIdx,setStepIdx]=useState(-1);
  const[isRunning,setIsRunning]=useState(false);
  const[speed,setSpeed]=useState(280);
  const[swaps,setSwaps]=useState(0);
  const[cmps,setCmps]=useState(0);
  const[msg,setMsg]=useState('');
  const[drag,setDrag]=useState({from:-1,to:-1});
  const[pSwaps,setPSwaps]=useState(0);
  const[combo,setCombo]=useState(0);
  const[optInv,setOptInv]=useState(0);
  const[showRes,setShowRes]=useState(false);
  const[resStars,setResStars]=useState(0);
  const[showHint,setShowHint]=useState(true);
  const[timerOn,setTimerOn]=useState(false);
  const[elapsed,setElapsed]=useState(0);
  const[timerActive,setTimerActive]=useState(false);
  const timerRef=useRef(null),stepTimer=useRef(null),intervalRef=useRef(null),stRef=useRef({monsters,pSwaps,optInv,drag,combo,elapsed});

  useEffect(()=>{stRef.current={monsters,pSwaps,optInv,drag,combo,elapsed};},[monsters,pSwaps,optInv,drag,combo,elapsed]);
  useEffect(()=>{const s=monsters.map(m=>({...m}));setInitSnap(s);setOptInv(countInversions(s.map(m=>m.hp)));},[]);// eslint-disable-line

  // Timer
  useEffect(()=>{
    if(timerActive){intervalRef.current=setInterval(()=>setElapsed(t=>t+1),1000);}
    else clearInterval(intervalRef.current);
    return()=>clearInterval(intervalRef.current);
  },[timerActive]);

  const cur=stepIdx>=0&&stepIdx<steps.length?steps[stepIdx]:null;
  const dispArr=cur?cur.arr.map((hp,i)=>({...MONSTERS[i%MONSTERS.length],hp})):monsters;
  const maxHp=Math.max(...dispArr.map(m=>m.hp),1);

  const prevStepRef=useRef(null);
  useEffect(()=>{
    if(gameMode!=='watch'||!cur)return;
    const p=prevStepRef.current; prevStepRef.current=cur; if(!p)return;
    if(cur.swapping&&cur.swapping.length)SFX.swap();
    else if(cur.comparing&&cur.comparing.length)SFX.compare();
  },[cur,gameMode]);

  const cc=idx=>{
    if(gameMode==='play'){
      if(drag.from===idx)return'dragging';
      if(drag.from!==-1&&drag.to===idx)return'drag-over';
      if(isSorted(monsters.map(m=>m.hp)))return'all-done';
      const h=showHint?getBubbleHint(monsters.map(m=>m.hp)):null;
      if(h&&(h[0]===idx||h[1]===idx))return'hint';
      return'';
    }
    if(!cur)return'';
    const{comparing,swapping,sorted,pivot,mr}=cur;
    if(sorted&&sorted.includes(idx))return'sorted';
    if(swapping&&swapping.includes(idx))return'swapping';
    if(comparing&&comparing.includes(idx))return'comparing';
    if(pivot===idx)return'pivot';
    if(mr&&idx>=mr[0]&&idx<=mr[1])return'merging';
    return'';
  };

  const genS=useCallback((mon,a)=>{const arr=mon.map(m=>m.hp);if(a==='bubble')return genBubble(arr);if(a==='quick')return genQuick(arr);return genMerge(arr);},[]);
  const stop=useCallback(()=>{setIsRunning(false);if(stepTimer.current){clearTimeout(stepTimer.current);stepTimer.current=null;}},[]);
  const resetW=()=>{stop();setStepIdx(-1);setSteps([]);setSwaps(0);setCmps(0);setMsg('');prevStepRef.current=null;};
  const chAlgo=a=>{SFX.click();stop();setAlgo(a);setStepIdx(-1);setSteps([]);setSwaps(0);setCmps(0);setMsg('');prevStepRef.current=null;};

  const shuffle=()=>{
    const m=mkM();SFX.click();stop();setMonsters(m);setInitSnap(m.map(x=>({...x})));setOptInv(countInversions(m.map(x=>x.hp)));
    setStepIdx(-1);setSteps([]);setSwaps(0);setCmps(0);setPSwaps(0);setCombo(0);setMsg('');setShowRes(false);setElapsed(0);setTimerActive(false);prevStepRef.current=null;
  };
  const retry=()=>{
    if(!initSnap)return;SFX.click();
    setMonsters(initSnap.map(x=>({...x})));setPSwaps(0);setCombo(0);setShowRes(false);setMsg('');setElapsed(0);setTimerActive(false);
  };
  const runWatch=()=>{SFX.click();let s=steps;if(!s.length){s=genS(monsters,algo);setSteps(s);}setIsRunning(true);setStepIdx(p=>p<0?0:p);};
  const stepFwd=()=>{let s=steps;if(!s.length){s=genS(monsters,algo);setSteps(s);}setStepIdx(prev=>{const next=Math.min(prev+1,s.length-1);if(s[next]){if(s[next].swapping&&s[next].swapping.length)setSwaps(c=>c+1);if(s[next].comparing&&s[next].comparing.length)setCmps(c=>c+1);}return next;});};
  const stepBck=()=>{SFX.click();setStepIdx(p=>Math.max(p-1,0));};

  const handleDS=idx=>{if(showRes||isSorted(monsters.map(m=>m.hp)))return;setDrag({from:idx,to:-1});};
  const handleDE=idx=>{if(drag.from===-1||drag.from===idx)return;setDrag(d=>({...d,to:idx}));};

  const commitSwap=useCallback(()=>{
    const{monsters:m,pSwaps:ps,optInv:oi,drag:d,combo:cb,elapsed:el}=stRef.current;
    setDrag({from:-1,to:-1});
    if(d.from===-1||d.to===-1||d.from===d.to)return;
    const hint=getBubbleHint(m.map(x=>x.hp));
    const isOpt=hint&&((d.from===hint[0]&&d.to===hint[1])||(d.from===hint[1]&&d.to===hint[0]));
    const nm=[...m];[nm[d.from],nm[d.to]]=[nm[d.to],nm[d.from]];
    setMonsters(nm);
    const ns=ps+1;setPSwaps(ns);
    const nc=isOpt?cb+1:0;setCombo(nc);
    SFX.swap();if(isOpt&&nc>1)SFX.combo(nc);
    if(ns===1&&timerOn){setTimerActive(true);}
    // Penguin mood feedback
    if(isSorted(nm.map(x=>x.hp))){
      PenguinBus.great();
      setTimerActive(false);
      const stars=calcStars(ns,oi);
      setResStars(stars);
      if(!multiPlayers)saveScore(levelKey,stars,el);
      SFX.sorted();setTimeout(()=>setShowRes(true),600);
    }else if(isOpt){
      PenguinBus.good();
    }else{
      PenguinBus.neutral();
    }
  },[timerOn,levelKey,multiPlayers]);

  // Touch support for monsters
  const touchPosToIdx=useCallback(e=>{
    const t=e.touches[0]||e.changedTouches[0];
    const el=document.elementFromPoint(t.clientX,t.clientY);
    if(el&&el.dataset.midx!==undefined)return parseInt(el.dataset.midx);
    return-1;
  },[]);

  useEffect(()=>{const up=()=>{if(stRef.current.drag.from!==-1)commitSwap();};window.addEventListener('mouseup',up);return()=>window.removeEventListener('mouseup',up);},[commitSwap]);

  useEffect(()=>{
    if(gameMode!=='watch'||!isRunning||!steps.length)return;
    if(stepIdx>=steps.length-1){setIsRunning(false);setMsg('SORTED! ✓');SFX.sorted();return;}
    stepTimer.current=setTimeout(()=>{setStepIdx(prev=>{const next=prev+1;if(steps[next]){if(steps[next].swapping&&steps[next].swapping.length)setSwaps(c=>c+1);if(steps[next].comparing&&steps[next].comparing.length)setCmps(c=>c+1);}return next;});},speed);
    return()=>clearTimeout(stepTimer.current);
  },[gameMode,isRunning,stepIdx,steps,speed]);

  const switchMode=m=>{SFX.click();stop();setGameMode(m);setStepIdx(-1);setSteps([]);setSwaps(0);setCmps(0);setMsg('');prevStepRef.current=null;if(m==='play'&&initSnap){setMonsters(initSnap.map(x=>({...x})));setPSwaps(0);setCombo(0);setShowRes(false);setElapsed(0);setTimerActive(false);}};

  const pseudo=PSEUDO[algo],compl=COMPL[algo],actLine=cur?cur.pl:-1;
  const hint=gameMode==='play'&&showHint?getBubbleHint(monsters.map(m=>m.hp)):null;
  const sorted=isSorted(monsters.map(m=>m.hp));

  const mpPlayerName=multiPlayers?multiPlayers[multiPlayerIdx]:null;
  const mpNextName=multiPlayers&&multiPlayerIdx<multiPlayers.length-1?multiPlayers[multiPlayerIdx+1]:null;
  const mpColor=multiPlayers?PCOLORS[multiPlayerIdx]:'var(--green)';
  const mpEmoji=multiPlayers?PEMOJIS[multiPlayerIdx]:'';
  const handleNext=()=>{setShowRes(false);onPlayerDone(resStars,pSwaps,elapsed,timerOn);};

  return(
    <div className="game-container">
      {showRes&&<ResultsOverlay stars={resStars} playerSwaps={pSwaps} optSwaps={optInv} timeS={elapsed} timerOn={timerOn}
        onRetry={retry} onMenu={onMenu}
        playerName={mpPlayerName} nextPlayerName={mpNextName}
        onNext={multiPlayers?handleNext:null}
      />}
      <div className="game-header">
        <button className="back-btn" onClick={()=>{SFX.back();onBack();}}>BACK</button>
        <span className="section-title">MONSTER SORTER</span>
        <span style={{fontSize:7,color:lv.color,fontFamily:"'Press Start 2P',cursive"}}>{lv.label}</span>
        {multiPlayers&&(
          <div className="player-turn-badge" style={{borderColor:mpColor,color:mpColor}}>
            {mpEmoji} {mpPlayerName} <span style={{color:'var(--tx3)'}}>• {multiPlayerIdx+1}/{multiPlayers.length}</span>
          </div>
        )}
        <HeaderRight/>
      </div>

      <div className="mode-tabs">
        <button className={`mode-tab${gameMode==='play'?' active':''}`} onClick={()=>switchMode('play')}>PLAY YOURSELF</button>
        <button className={`mode-tab${gameMode==='watch'?' active':''}`} onClick={()=>switchMode('watch')}>WATCH COMPUTER</button>
      </div>

      <div className="sort-layout">
        <div>
          {gameMode==='watch'&&(
            <div style={{marginBottom:10}}>
              <div style={{fontFamily:"'Press Start 2P',cursive",fontSize:7,color:'var(--tx3)',marginBottom:6}}>CHOOSE A SORTING METHOD:</div>
              <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
                {[['bubble','BUBBLE SORT'],['quick','QUICK SORT'],['merge','MERGE SORT']].map(([a,lb])=>(
                  <button key={a} className={`algo-btn${algo===a?' active':''}`} onClick={()=>chAlgo(a)}>{lb}</button>
                ))}
              </div>
              {algo==='bubble'&&<div className="algo-desc">Bubble Sort: Compares two neighbors at a time and swaps them if they are in the wrong order. Repeats until everything is sorted.</div>}
              {algo==='quick'&&<div className="algo-desc">Quick Sort: Picks one monster as a "pivot" and moves all smaller monsters to its left and larger to its right. Repeats on each half.</div>}
              {algo==='merge'&&<div className="algo-desc">Merge Sort: Splits the group in half repeatedly, sorts each half, then merges them back together in order.</div>}
            </div>
          )}

          <div className="monster-arena">
            {gameMode==='play'&&pSwaps===0&&!sorted&&(
              <div className="how-to-play-strip">
                <strong>HOW TO PLAY:</strong> Drag any monster card left or right to swap it with another. Sort them from <strong>lowest HP (left)</strong> to <strong>highest HP (right)</strong>. The yellow glowing cards show the best swap to make!
              </div>
            )}
            {gameMode==='play'&&(
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8,flexWrap:'wrap'}}>
                <button className={`algo-btn${showHint?' active':''}`} onClick={()=>{SFX.click();setShowHint(h=>!h);}}>BEST MOVE {showHint?'ON':'OFF'}</button>
                <button className={`algo-btn${timerOn?' active':''}`} onClick={()=>{SFX.click();setTimerOn(t=>{if(!t)setElapsed(0);return!t;});}}>TIMER {timerOn?'ON':'OFF'}</button>
                {timerOn&&<span style={{fontFamily:"'Press Start 2P',cursive",fontSize:9,color:timerActive?'#ffdd00':'var(--tx3)'}}>{fmtTime(elapsed)}</span>}
                {hint&&!sorted&&<span style={{fontSize:8,color:'#ffdd00',fontFamily:"'Press Start 2P',cursive"}}>Swap the highlighted ones!</span>}
                {sorted&&<span style={{fontSize:8,color:'var(--green)',fontFamily:"'Press Start 2P',cursive"}}>ALL SORTED!</span>}
              </div>
            )}

            {gameMode==='play'&&combo>1&&(
              <div className="combo-row"><span className="combo-num" key={combo}>x{combo}</span><span className="combo-label">COMBO!</span></div>
            )}

            <div className="monster-row" onMouseLeave={()=>drag.from!==-1&&setDrag(d=>({...d,to:-1}))}>
              {dispArr.map((m,idx)=>(
                <div key={idx} className={`monster-card ${cc(idx)}`}
                  style={{height:`${95+Math.round((m.hp/maxHp)*80)}px`}}
                  data-midx={idx}
                  onMouseDown={()=>gameMode==='play'&&handleDS(idx)}
                  onMouseEnter={()=>gameMode==='play'&&handleDE(idx)}
                  onTouchStart={e=>{e.preventDefault();if(gameMode==='play')handleDS(idx);}}
                  onTouchMove={e=>{e.preventDefault();if(gameMode==='play'){const i=touchPosToIdx(e);if(i>=0)handleDE(i);}}}
                  onTouchEnd={e=>{e.preventDefault();if(gameMode==='play')commitSwap();}}
                >
                  <div className="monster-emoji">{m.emoji}</div>
                  <div className="monster-name">{m.name}</div>
                  <div className="monster-hp">{m.hp}</div>
                  <div className="hp-bar"><div className="hp-fill" style={{width:`${(m.hp/maxHp)*100}%`,background:m.color}}/></div>
                </div>
              ))}
            </div>

            {msg&&<div className={`message${msg.includes('SORTED')?' success':' info'}`}>{msg}</div>}

            {gameMode==='watch'?(
              <>
                <div className="controls-bar">
                  <button className="btn btn-green" onClick={runWatch}   disabled={isRunning}>RUN</button>
                  <button className="btn btn-gray"  onClick={stop}       disabled={!isRunning} title="Pause">PAUSE</button>
                  <button className="btn btn-gray"  onClick={stepBck}    disabled={isRunning||stepIdx<=0} title="Step back">PREV</button>
                  <button className="btn btn-gray"  onClick={stepFwd}    disabled={isRunning} title="Step forward">NEXT</button>
                  <button className="btn btn-cyan"  onClick={shuffle} title="New random array">SHUFFLE</button>
                  <button className="btn btn-red"   onClick={resetW} title="Reset">RESET</button>
                  <div className="speed-control"><span>FAST</span><input type="range" min={40} max={800} value={speed} onChange={e=>setSpeed(+e.target.value)} style={{transform:'scaleX(-1)'}}/><span>SLOW</span></div>
                </div>
                <div className="stats-bar">
                  <div className="stat-item"><div className="stat-label">COMPARES</div><div className="stat-value" style={{color:'#3377ff'}}>{cmps}</div></div>
                  <div className="stat-item"><div className="stat-label">SWAPS</div><div className="stat-value" style={{color:'#ff3355'}}>{swaps}</div></div>
                  <div className="stat-item"><div className="stat-label">STEP</div><div className="stat-value" style={{color:'#ffdd00',fontSize:13}}>{stepIdx<0?0:stepIdx}<span style={{fontSize:7,color:'var(--tx4)'}}>/{steps.length}</span></div></div>
                </div>
              </>
            ):(
              <div className="controls-bar">
                <button className="btn btn-cyan"   onClick={shuffle}>NEW MONSTERS</button>
                <button className="btn btn-gray"   onClick={retry}>TRY AGAIN</button>
                <div className="stats-bar" style={{marginLeft:4}}>
                  <div className="stat-item"><div className="stat-label">YOUR MOVES</div><div className="stat-value" style={{color:'#ff3355'}}>{pSwaps}</div></div>
                  <div className="stat-item" title="The fewest moves possible to sort these monsters"><div className="stat-label">IDEAL MOVES</div><div className="stat-value" style={{color:'#ffdd00'}}>{optInv}</div></div>
                  <div className="stat-item"><div className="stat-label">COMBO</div><div className="stat-value" style={{color:'#ff00cc'}}>{combo}</div></div>
                </div>
              </div>
            )}
          </div>
        </div>

        <div className="side-panel">
          {gameMode==='watch'?(
            <>
              <div className="panel-box">
                <div className="panel-title">STEP-BY-STEP CODE</div>
                <div style={{fontSize:9,color:'var(--tx4)',marginBottom:6}}>The highlighted line shows what the computer is doing right now.</div>
                <div className="pseudo-code">{pseudo.map((l,i)=><div key={i} className={`pseudo-line indent${l.i}${actLine===i?' active':''}`}>{l.t}</div>)}</div>
              </div>
              <div className="panel-box">
                <div className="panel-title">HOW FAST IS IT?</div>
                <div style={{fontSize:10,color:'var(--tx2)',lineHeight:2}}>
                  <div>Speed: <span style={{color:'var(--tx)'}}>{compl.time}</span></div>
                  <div>Memory used: <span style={{color:'var(--tx)'}}>{compl.space}</span></div>
                </div>
                <div style={{fontSize:9,color:'var(--tx3)',marginTop:6,lineHeight:1.7}}>
                  {algo==='bubble'&&'n = number of monsters. n² means it gets slow quickly with large groups.'}
                  {algo==='quick'&&'n log n is much faster than n². Great for large groups!'}
                  {algo==='merge'&&'Always n log n — consistent and reliable even in the worst case.'}
                </div>
              </div>
              <div className="panel-box">
                <div className="panel-title">CARD COLOURS</div>
                <div style={{fontSize:10,lineHeight:2.1}}>
                  <div><span style={{color:'#3377ff'}}>■</span> Being compared</div>
                  <div><span style={{color:'#ff3344'}}>■</span> Being swapped</div>
                  <div><span style={{color:'#ffdd00'}}>■</span> Pivot / merging</div>
                  <div><span style={{color:'var(--green)'}}>■</span> Fully sorted</div>
                </div>
              </div>
            </>
          ):(
            <>
              <div className="panel-box">
                <div className="panel-title">HOW TO PLAY</div>
                <div style={{fontSize:10,color:'var(--tx3)',lineHeight:2.3}}>
                  <div><strong style={{color:'var(--tx)'}}>Goal:</strong> Sort weakest to strongest</div>
                  <div><strong style={{color:'#ffdd00'}}>Yellow glow</strong> = best swap right now</div>
                  <div><strong style={{color:'#ff00cc'}}>Combo</strong> = follow hints in a row</div>
                  <div><strong style={{color:'var(--green)'}}>3 stars</strong> = close to perfect moves</div>
                  <div>Timer is optional — toggle it above</div>
                </div>
              </div>
              <div className="panel-box">
                <div className="panel-title">BEST NEXT SWAP</div>
                {hint?(<div style={{fontSize:10,color:'var(--tx2)',lineHeight:2}}>
                  <div style={{color:'var(--tx3)',marginBottom:4}}>Swap these two right now:</div>
                  <div style={{color:'#ffdd00',fontWeight:'bold'}}>{monsters[hint[0]]?.emoji} {monsters[hint[0]]?.name} — {monsters[hint[0]]?.hp} HP</div>
                  <div style={{color:'var(--tx4)',margin:'2px 0'}}>with</div>
                  <div style={{color:'#ffdd00',fontWeight:'bold'}}>{monsters[hint[1]]?.emoji} {monsters[hint[1]]?.name} — {monsters[hint[1]]?.hp} HP</div>
                </div>):<div style={{color:'var(--green)',fontSize:10}}>All sorted! Great job!</div>}
              </div>
              <div className="panel-box">
                <div className="panel-title">YOUR SCORE</div>
                <div style={{fontSize:10,color:'var(--tx3)',lineHeight:2.1}}>
                  <div>Your moves: <span style={{color:'var(--tx)'}}>{pSwaps}</span></div>
                  <div>Ideal moves: <span style={{color:'#ffdd00'}}>{optInv}</span></div>
                  <div>Combo chain: <span style={{color:'#ff00cc'}}>{combo>0?`x${combo}`:'—'}</span></div>
                  {timerOn&&<div>Time: <span style={{color:timerActive?'#ffdd00':'var(--tx)'}}>{fmtTime(elapsed)}</span></div>}
                  {getBest(levelKey)&&<div>Best ever: <span style={{color:'var(--green)'}}>{getBest(levelKey).stars} stars</span></div>}
                </div>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ── PATHFINDING GAME ──────────────────────────────────────────────────────
function PathfindingGame({onBack}){
  const[grid,setGrid]=useState(genMaze);
  const[start,setStart]=useState([1,1]);
  const[end,setEnd]=useState([ROWS-2,COLS-2]);
  const[algo,setAlgo]=useState('astar');
  const[tool,setTool]=useState('wall');
  const[isRunning,setIsRunning]=useState(false);
  const[speed,setSpeed]=useState(25);
  const[frames,setFrames]=useState([]);
  const[frameIdx,setFrameIdx]=useState(-1);
  const[result,setResult]=useState(null);
  const[mouseDown,setMouseDown]=useState(false);
  const[msg,setMsg]=useState('');
  const timer=useRef(null);

  const frame=frameIdx>=0&&frameIdx<frames.length?frames[frameIdx]:null;
  const cc=(r,c)=>{
    if(r===start[0]&&c===start[1])return'cell-start';if(r===end[0]&&c===end[1])return'cell-end';if(grid[r][c].wall)return'cell-wall';
    if(frame){const k=`${r},${c}`;if(frame.path&&frame.path.some(([pr,pc])=>pr===r&&pc===c))return'cell-path';if(frame.current&&frame.current[0]===r&&frame.current[1]===c)return'cell-current';if(frame.visited&&frame.visited.has(k))return'cell-closed';if(frame.open&&frame.open.has(k))return'cell-open';}
    return'cell-empty';
  };
  const resetViz=()=>{setIsRunning(false);if(timer.current){clearTimeout(timer.current);timer.current=null;}setFrames([]);setFrameIdx(-1);setResult(null);setMsg('');};
  const interact=(r,c)=>{
    if(isRunning)return;if(tool==='start'){setStart([r,c]);resetViz();return;}if(tool==='end'){setEnd([r,c]);resetViz();return;}
    if(r===start[0]&&c===start[1])return;if(r===end[0]&&c===end[1])return;
    const g=grid.map(row=>row.map(cell=>({...cell})));const was=g[r][c].wall;g[r][c].wall=(tool==='wall');if(tool==='wall'&&!was)SFX.wall();setGrid(g);resetViz();
  };
  const run=()=>{SFX.click();PenguinBus.activity();resetViz();const{frames:f,path,found}=runPath(grid,start,end,algo==='astar');setFrames(f);setResult({path,found});setFrameIdx(0);setIsRunning(true);};
  const newMaze=()=>{SFX.click();resetViz();setGrid(genMaze());setStart([1,1]);setEnd([ROWS-2,COLS-2]);};

  // Touch for grid
  const touchCell=e=>{const t=e.touches[0]||e.changedTouches[0];const el=document.elementFromPoint(t.clientX,t.clientY);if(el&&el.dataset.rc){const[r,c]=el.dataset.rc.split(',').map(Number);interact(r,c);}};

  useEffect(()=>{
    if(!isRunning||!frames.length)return;
    if(frameIdx>=frames.length-1){setIsRunning(false);const found=result?.found;setMsg(found?'PATH FOUND! ✓':'NO PATH EXISTS ⛔');if(found){SFX.pathFound();PenguinBus.great();}else{SFX.noPath();PenguinBus.bad();}return;}
    timer.current=setTimeout(()=>setFrameIdx(p=>p+1),speed);return()=>clearTimeout(timer.current);
  },[isRunning,frameIdx,frames,speed,result]);

  const vc=frame?.visited?.size??0,qs=frame?.queue?.length??0,pl=(result?.found&&frameIdx>=frames.length-1)?result.path.length:0;

  return(
    <div className="game-container">
      <div className="game-header">
        <button className="back-btn" onClick={()=>{SFX.back();onBack();}}>BACK</button>
        <span className="section-title">DUNGEON ESCAPE</span>
        <HeaderRight/>
      </div>
      <div className="path-layout">
        <div>
          <div className="how-to-play-strip" style={{marginBottom:10}}>
            <strong>HOW TO PLAY:</strong> Pick a method, then press <strong>RUN</strong>. Watch the computer find a path from the green start to the red finish. You can draw walls to block the path!
          </div>
          <div style={{display:'flex',gap:7,marginBottom:10,flexWrap:'wrap',alignItems:'center'}}>
            {[['astar','A-STAR (SMART)'],['dijkstra','DIJKSTRA (THOROUGH)']].map(([a,lb])=>(
              <button key={a} className={`algo-btn${algo===a?' active':''}`} onClick={()=>{SFX.click();setAlgo(a);resetViz();}}>{lb}</button>
            ))}
            <button className="btn btn-green" onClick={run} disabled={isRunning}>RUN</button>
            <button className="btn btn-gray"  onClick={()=>{SFX.click();setIsRunning(false);}} disabled={!isRunning}>PAUSE</button>
            <button className="btn btn-cyan"  onClick={newMaze}>NEW MAZE</button>
            <button className="btn btn-red"   onClick={()=>{SFX.click();resetViz();}}>RESET</button>
          </div>
          <div className="tool-select">
            <span style={{fontSize:8,color:'var(--tx3)',alignSelf:'center',fontFamily:"'Press Start 2P',cursive"}}>DRAW:</span>
            {[['wall','DRAW WALL'],['erase','ERASE'],['start','MOVE START'],['end','MOVE FINISH']].map(([t,lb])=>(
              <button key={t} className={`tool-btn${tool===t?' active':''}`} onClick={()=>{SFX.click();setTool(t);}}>{lb}</button>
            ))}
          </div>
          {msg&&<div className={`message${msg.includes('FOUND')?' success':msg.includes('NO')?' error':' info'}`}>{msg}</div>}
          <div className="dungeon-area">
            <div className="dungeon-grid" style={{gridTemplateColumns:`repeat(${COLS},25px)`}} onMouseLeave={()=>setMouseDown(false)}
              onTouchStart={e=>{e.preventDefault();setMouseDown(true);touchCell(e);}}
              onTouchMove={e=>{e.preventDefault();if(mouseDown)touchCell(e);}}
              onTouchEnd={()=>setMouseDown(false)}
            >
              {grid.map((row,r)=>row.map((_,c)=>(
                <div key={`${r}-${c}`} className={`grid-cell ${cc(r,c)}`} data-rc={`${r},${c}`}
                  onMouseDown={()=>{setMouseDown(true);interact(r,c);}}
                  onMouseUp={()=>setMouseDown(false)}
                  onMouseEnter={()=>{if(mouseDown)interact(r,c);}}
                />
              )))}
            </div>
            <div className="legend">
              {[['#00ff88','Start (green)'],['#ff3355','Finish (red)'],['#1133cc99','Next to check'],['#1a1a3688','Already checked'],['#ffdd00','Checking now'],['var(--cyan)','Final path'],['var(--bd)','Wall']].map(([color,label])=>(
                <div key={label} className="legend-item"><div className="legend-dot" style={{background:color,border:'1px solid var(--bd2)'}}/><span>{label}</span></div>
              ))}
            </div>
            <div className="stats-bar" style={{marginTop:10}}>
              <div className="stat-item"><div className="stat-label">SQUARES CHECKED</div><div className="stat-value" style={{color:'#3377ff'}}>{vc}</div></div>
              <div className="stat-item"><div className="stat-label">IN QUEUE</div><div className="stat-value" style={{color:'#ff00cc'}}>{qs}</div></div>
              <div className="stat-item"><div className="stat-label">PATH LENGTH</div><div className="stat-value" style={{color:'var(--green)'}}>{pl||'—'}</div></div>
              <div className="stat-item"><div className="stat-label">STEP</div><div className="stat-value" style={{color:'#ffdd00',fontSize:12}}>{frameIdx<0?0:frameIdx}<span style={{fontSize:7,color:'var(--tx4)'}}>/{frames.length}</span></div></div>
            </div>
            <div className="speed-control" style={{marginTop:10}}><span>FAST</span><input type="range" min={5} max={200} value={speed} onChange={e=>setSpeed(+e.target.value)} style={{transform:'scaleX(-1)',width:130}}/><span>SLOW</span></div>
          </div>
        </div>
        <div className="side-panel">
          <div className="panel-box">
            <div className="panel-title">HOW THIS METHOD WORKS</div>
            <div style={{fontSize:10,color:'var(--tx2)',lineHeight:2}}>
              {algo==='astar'?(<>
                <div style={{color:'var(--green)',fontFamily:"'Press Start 2P',cursive",fontSize:8,marginBottom:6}}>A-STAR (SMART)</div>
                <div style={{color:'var(--tx3)',lineHeight:1.9}}>A-Star is smart — it always heads towards the goal. It uses a shortcut (called a heuristic) to guess how far away the finish is, so it explores fewer dead ends.</div>
                <div style={{marginTop:8,color:'#ffdd00',fontWeight:'bold'}}>Result: Finds the shortest path quickly!</div>
              </>):(<>
                <div style={{color:'var(--cyan)',fontFamily:"'Press Start 2P',cursive",fontSize:8,marginBottom:6}}>DIJKSTRA (THOROUGH)</div>
                <div style={{color:'var(--tx3)',lineHeight:1.9}}>Dijkstra checks every possible direction equally. It has no sense of where the goal is, so it spreads out in all directions until it finds the finish.</div>
                <div style={{marginTop:8,color:'#ffdd00',fontWeight:'bold'}}>Result: Always finds the shortest path, but visits more squares.</div>
              </>)}
            </div>
          </div>
          <div className="panel-box">
            <div className="panel-title">CANDIDATES BEING CHECKED</div>
            <div style={{fontSize:9,color:'var(--tx4)',marginBottom:4}}>These are the next squares the computer might visit (sorted by priority):</div>
            <div className="queue-panel">
              {frame?.queue?.length?frame.queue.map((item,i)=>(
                <div key={i} className="queue-item"><span className="q-pos">Row {item.r}, Col {item.c}</span><span className="q-f">score={item.f}</span><span className="q-g">steps={item.g}</span></div>
              )):<div style={{color:'var(--tx4)',fontSize:10,padding:7}}>Press RUN to see the candidates...</div>}
            </div>
          </div>
          <div className="panel-box">
            <div className="panel-title">TIPS</div>
            <div style={{fontSize:10,color:'var(--tx3)',lineHeight:2.2}}>
              <div>Click and drag on the grid to draw walls</div>
              <div>Try blocking the direct path to see re-routing</div>
              <div>Compare both methods on the same maze</div>
              <div>A-Star visits fewer squares than Dijkstra</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── BINARY SEARCH GAME ────────────────────────────────────────────────────
function BinarySearchGame({onBack}){
  const SIZE=16;
  const mkArr=()=>genBSArray(SIZE);
  const[arr,setArr]=useState(mkArr);
  const[target,setTarget]=useState(null);
  const[steps,setSteps]=useState([]);
  const[stepIdx,setStepIdx]=useState(-1);
  const[isRunning,setIsRunning]=useState(false);
  const[speed,setSpeed]=useState(600);
  const[msg,setMsg]=useState('');
  const[phase,setPhase]=useState('pick'); // pick | run
  const timer=useRef(null);

  const cur=stepIdx>=0&&stepIdx<steps.length?steps[stepIdx]:null;
  const done=cur&&(cur.phase==='found'||cur.phase==='notFound');

  const pickTarget=val=>{SFX.click();setTarget(val);setPhase('run');const s=genBSSteps(arr,val);setSteps(s);setStepIdx(0);setMsg('');};
  const reset=()=>{SFX.click();if(timer.current)clearTimeout(timer.current);const a=mkArr();setArr(a);setTarget(null);setSteps([]);setStepIdx(-1);setIsRunning(false);setMsg('');setPhase('pick');};
  const run=()=>{SFX.click();setIsRunning(true);};
  const stepFwd=()=>{if(stepIdx>=steps.length-1)return;setStepIdx(p=>p+1);};
  const stepBck=()=>{SFX.click();setStepIdx(p=>Math.max(p-1,0));};
  const pause=()=>{SFX.click();setIsRunning(false);if(timer.current)clearTimeout(timer.current);};

  useEffect(()=>{
    if(!isRunning||!steps.length)return;
    if(stepIdx>=steps.length-1){setIsRunning(false);const last=steps[steps.length-1];if(last.phase==='found'){setMsg(`FOUND ${target} at index ${last.mid}! ✓`);SFX.found();PenguinBus.great();}else{setMsg(`${target} NOT IN ARRAY ✗`);SFX.noPath();PenguinBus.bad();}return;}
    timer.current=setTimeout(()=>setStepIdx(p=>p+1),speed);return()=>clearTimeout(timer.current);
  },[isRunning,stepIdx,steps,speed,target]);

  const cellCls=idx=>{
    if(!cur)return phase==='pick'?'target-pick':'';
    if(cur.phase==='found'&&idx===cur.mid)return'found';
    if(idx<cur.lo||idx>cur.hi)return'elim';
    if(idx===cur.mid)return'mid';
    return'';
  };

  return(
    <div className="game-container">
      <div className="game-header">
        <button className="back-btn" onClick={()=>{SFX.back();onBack();}}>BACK</button>
        <span className="section-title">NUMBER HUNT — BINARY SEARCH</span>
        <HeaderRight/>
      </div>
      <div className="bs-layout">
        <div>
          <div className="bs-arena">
            {phase==='pick'&&<div className="how-to-play-strip" style={{marginBottom:12}}><strong>HOW TO PLAY:</strong> Click any number below to pick it as your target. Then watch the computer find it by cutting the remaining numbers in half each step!</div>}
            {phase==='run'&&target!==null&&<div style={{fontFamily:"'Press Start 2P',cursive",fontSize:9,color:'var(--cyan)',marginBottom:12}}>SEARCHING FOR: <span style={{color:'#ffdd00'}}>{target}</span></div>}

            <div className="bs-array">
              {arr.map((val,idx)=>(
                <div key={idx} className={`bs-cell ${cellCls(idx)}`}
                  onClick={()=>{if(phase==='pick')pickTarget(val);}}
                  style={{position:'relative'}}
                >
                  <div className="bs-val">{val}</div>
                  <div className="bs-idx">[{idx}]</div>
                  {cur&&idx===cur.mid&&<div className="bs-ptr" style={{color:'#ffdd00'}}>CHECK</div>}
                  {cur&&idx===cur.lo&&idx!==cur.mid&&<div className="bs-ptr" style={{color:'var(--green)'}}>LEFT</div>}
                  {cur&&idx===cur.hi&&idx!==cur.mid&&<div className="bs-ptr" style={{color:'#ff3355'}}>RIGHT</div>}
                </div>
              ))}
            </div>

            {msg&&<div className={`message${msg.includes('FOUND')&&!msg.includes('NOT')?' success':(msg.includes('NOT')?' error':' info')}`}>{msg}</div>}

            <div className="controls-bar">
              {phase==='run'&&<>
                <button className="btn btn-green"  onClick={run}     disabled={isRunning||done}>RUN</button>
                <button className="btn btn-gray"   onClick={pause}   disabled={!isRunning}>PAUSE</button>
                <button className="btn btn-gray"   onClick={stepBck} disabled={isRunning||stepIdx<=0}>PREV STEP</button>
                <button className="btn btn-gray"   onClick={stepFwd} disabled={isRunning||done}>NEXT STEP</button>
                <div className="speed-control"><span>FAST</span><input type="range" min={100} max={1200} value={speed} onChange={e=>setSpeed(+e.target.value)} style={{transform:'scaleX(-1)'}}/><span>SLOW</span></div>
              </>}
              <button className="btn btn-cyan" onClick={reset}>NEW NUMBERS</button>
            </div>

            <div className="stats-bar" style={{marginTop:8}}>
              <div className="stat-item"><div className="stat-label">STEP</div><div className="stat-value" style={{color:'#ffdd00',fontSize:13}}>{stepIdx<0?0:stepIdx}<span style={{fontSize:7,color:'var(--tx4)'}}>/{steps.length}</span></div></div>
              {cur&&<><div className="stat-item" title="Left boundary of the remaining search range"><div className="stat-label">LEFT</div><div className="stat-value" style={{color:'var(--green)'}}>{cur.lo}</div></div>
              <div className="stat-item" title="Right boundary of the remaining search range"><div className="stat-label">RIGHT</div><div className="stat-value" style={{color:'#ff3355'}}>{cur.hi}</div></div>
              <div className="stat-item" title="The number currently being checked"><div className="stat-label">CHECKING</div><div className="stat-value" style={{color:'#ffdd00'}}>{cur.mid}</div></div></>}
            </div>
          </div>
        </div>

        <div className="side-panel">
          <div className="panel-box">
            <div className="panel-title">STEP-BY-STEP CODE</div>
            <div style={{fontSize:9,color:'var(--tx4)',marginBottom:6}}>The highlighted line shows what the computer is doing right now.</div>
            <div className="pseudo-code">
              {[
                {t:'lo=0, hi=n-1',i:0},
                {t:'while lo <= hi:',i:0},
                {t:'mid=(lo+hi)/2',i:1},
                {t:'if arr[mid]==target:',i:1},
                {t:'return mid ✓',i:2},
                {t:'elif arr[mid] < target:',i:1},
                {t:'lo = mid + 1',i:2},
                {t:'else:',i:1},
                {t:'hi = mid - 1',i:2},
                {t:'return -1 (not found)',i:0},
              ].map((l,i)=>{
                let active=false;
                if(cur){if(cur.phase==='check'&&i===2)active=true;if(cur.phase==='found'&&i===4)active=true;if(cur.phase==='goRight'&&i===6)active=true;if(cur.phase==='goLeft'&&i===8)active=true;if(cur.phase==='notFound'&&i===9)active=true;}
                return<div key={i} className={`pseudo-line indent${l.i}${active?' active':''}`}>{l.t}</div>;
              })}
            </div>
          </div>
          <div className="panel-box">
            <div className="panel-title">WHY IS IT SO FAST?</div>
            <div style={{fontSize:10,color:'var(--tx2)',lineHeight:1.9}}>
              <div style={{marginBottom:6}}>Binary Search cuts the list in <strong style={{color:'var(--green)'}}>half</strong> every step. It never re-checks anything!</div>
              <div style={{color:'var(--tx3)'}}>List size: <strong style={{color:'var(--tx)'}}>{SIZE} numbers</strong></div>
              <div style={{color:'var(--tx3)'}}>Worst case: <strong style={{color:'#ffdd00'}}>{Math.ceil(Math.log2(SIZE))} steps</strong></div>
              <div style={{marginTop:8,color:'var(--tx3)',lineHeight:1.7}}>For comparison — a simple search would take up to {SIZE} steps to check every number one by one!</div>
            </div>
          </div>
          <div className="panel-box">
            <div className="panel-title">COLOUR GUIDE</div>
            <div style={{fontSize:10,lineHeight:2.2}}>
              <div><span style={{color:'#ffdd00'}}>■</span> Currently checking this number</div>
              <div><span style={{color:'var(--green)'}}>■</span> Found it!</div>
              <div><span style={{color:'var(--tx4)'}}>■</span> Eliminated — no longer possible</div>
              <div><span style={{color:'var(--cyan)'}}>■</span> Click to pick this as your target</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── GRAPH BFS/DFS GAME ────────────────────────────────────────────────────
function GraphGame({onBack}){
  const[algo,setAlgo]=useState('bfs');
  const[startNode,setStartNode]=useState(0);
  const[steps,setSteps]=useState([]);
  const[stepIdx,setStepIdx]=useState(-1);
  const[isRunning,setIsRunning]=useState(false);
  const[speed,setSpeed]=useState(500);
  const[msg,setMsg]=useState('Select start node, then RUN');
  const timer=useRef(null);

  const cur=stepIdx>=0&&stepIdx<steps.length?steps[stepIdx]:null;
  const done=cur&&stepIdx===steps.length-1;

  const run=()=>{SFX.click();PenguinBus.activity();const s=algo==='bfs'?genBFS(startNode):genDFS(startNode);setSteps(s);setStepIdx(0);setIsRunning(true);setMsg('');};
  const reset=()=>{SFX.click();if(timer.current)clearTimeout(timer.current);setSteps([]);setStepIdx(-1);setIsRunning(false);setMsg('Select start node, then RUN');};
  const pause=()=>{SFX.click();setIsRunning(false);if(timer.current)clearTimeout(timer.current);};
  const stepFwd=()=>{if(stepIdx>=steps.length-1)return;setStepIdx(p=>p+1);};
  const stepBck=()=>{SFX.click();setStepIdx(p=>Math.max(p-1,0));};

  useEffect(()=>{
    if(!isRunning||!steps.length)return;
    if(stepIdx>=steps.length-1){setIsRunning(false);setMsg(`${algo.toUpperCase()} complete! All ${steps.length} nodes visited.`);SFX.sorted();PenguinBus.great();return;}
    timer.current=setTimeout(()=>setStepIdx(p=>p+1),speed);return()=>clearTimeout(timer.current);
  },[isRunning,stepIdx,steps,speed,algo]);

  const visitedEdges=new Set();
  if(cur){GEDGES.forEach(([a,b])=>{if(cur.visited.has(a)&&cur.visited.has(b))visitedEdges.add(edgeKey(a,b));});}

  const nodeColor=id=>{
    if(!cur){return id===startNode?'#ffdd00':'var(--bg3)';}
    if(id===cur.current)return algo==='bfs'?'var(--cyan)':'#ff00cc';
    if(cur.visited.has(id))return'var(--green)';
    return'var(--bg3)';
  };
  const nodeStroke=id=>{
    if(!cur)return id===startNode?'#ffdd00':'var(--bd)';
    if(id===cur.current)return algo==='bfs'?'var(--cyan)':'#ff00cc';
    if(cur.visited.has(id))return'var(--green)';
    return'var(--bd)';
  };

  const traversalOrder=steps.slice(0,stepIdx+1).map(s=>s.current);

  return(
    <div className="game-container">
      <div className="game-header">
        <button className="back-btn" onClick={()=>{SFX.back();onBack();}}>BACK</button>
        <span className="section-title">MAP EXPLORER — BFS / DFS</span>
        <HeaderRight/>
      </div>
      <div className="graph-layout">
        <div>
          <div className="how-to-play-strip" style={{marginBottom:10}}>
            <strong>HOW TO PLAY:</strong> Click any circle (node) on the map to set your starting point. Then press <strong>RUN</strong> to watch the computer explore all connected places one by one.
          </div>
          <div style={{marginBottom:8}}>
            <div style={{fontFamily:"'Press Start 2P',cursive",fontSize:7,color:'var(--tx3)',marginBottom:6}}>CHOOSE A SEARCH METHOD:</div>
            <div style={{display:'flex',gap:7,flexWrap:'wrap',alignItems:'center',marginBottom:6}}>
              {[['bfs','BFS — CLOSEST FIRST'],['dfs','DFS — DEEPEST FIRST']].map(([a,lb])=>(
                <button key={a} className={`algo-btn${algo===a?' active':''}`} onClick={()=>{SFX.click();setAlgo(a);reset();}}>{lb}</button>
              ))}
            </div>
            {algo==='bfs'&&<div className="algo-desc">BFS (Breadth-First Search): Visits all directly connected places first, then their neighbours, and so on. Like a ripple spreading in water — level by level.</div>}
            {algo==='dfs'&&<div className="algo-desc">DFS (Depth-First Search): Picks one path and follows it as far as possible before turning back. Like exploring a cave — go deep, then backtrack.</div>}
          </div>
          <div style={{display:'flex',gap:7,marginBottom:10,flexWrap:'wrap',alignItems:'center'}}>
            <button className="btn btn-green"  onClick={run}     disabled={isRunning}>RUN</button>
            <button className="btn btn-gray"   onClick={pause}   disabled={!isRunning}>PAUSE</button>
            <button className="btn btn-gray"   onClick={stepBck} disabled={isRunning||stepIdx<=0}>PREV</button>
            <button className="btn btn-gray"   onClick={stepFwd} disabled={isRunning||done}>NEXT</button>
            <button className="btn btn-red"    onClick={reset}>RESET</button>
            <div className="speed-control"><span>FAST</span><input type="range" min={100} max={1500} value={speed} onChange={e=>setSpeed(+e.target.value)} style={{transform:'scaleX(-1)'}}/><span>SLOW</span></div>
          </div>

          <div className="graph-arena">
            <div style={{fontFamily:"'Press Start 2P',cursive",fontSize:8,color:'var(--tx3)',marginBottom:8}}>
              {!steps.length?'Click any circle to set your start point, then press RUN':msg||`STEP ${stepIdx+1} / ${steps.length}`}
            </div>

            <svg className="graph-svg" viewBox="0 0 560 330">
              {GEDGES.map(([a,b])=>(
                <line key={`${a}-${b}`} className={`graph-edge${visitedEdges.has(edgeKey(a,b))?' visited':''}`}
                  x1={GNODES[a].x} y1={GNODES[a].y} x2={GNODES[b].x} y2={GNODES[b].y}
                  stroke={visitedEdges.has(edgeKey(a,b))?'var(--green)':'var(--bd2)'} strokeWidth="2"
                />
              ))}
              {GNODES.map(n=>(
                <g key={n.id} className="graph-node" onClick={()=>{if(!isRunning){SFX.click();setStartNode(n.id);reset();}}}
                  style={{filter:n.id===(cur?.current)&&algo==='bfs'?'drop-shadow(0 0 8px var(--cyan))':n.id===(cur?.current)&&algo==='dfs'?'drop-shadow(0 0 8px #ff00cc)':cur?.visited?.has(n.id)?'drop-shadow(0 0 5px var(--green))':'none'}}
                >
                  <circle cx={n.x} cy={n.y} r="22" fill={nodeColor(n.id)} stroke={nodeStroke(n.id)} strokeWidth="2.5"/>
                  <text x={n.x} y={n.y+4} textAnchor="middle" fontSize="12" fontFamily="'Press Start 2P',cursive" fill={cur?.visited?.has(n.id)||n.id===cur?.current?'#000':'var(--tx)'}>{n.label}</text>
                </g>
              ))}
            </svg>

            <div style={{fontFamily:"'Press Start 2P',cursive",fontSize:7,color:'var(--tx3)',marginTop:8,marginBottom:6}}>
              ORDER VISITED:
            </div>
            <div className="traversal-order">
              {traversalOrder.map((id,i)=>(
                <div key={i} className={`order-badge${i===traversalOrder.length-1?' current':''}`}>
                  {GNODES[id].label}
                </div>
              ))}
              {traversalOrder.length===0&&<span style={{color:'var(--tx4)',fontSize:10}}>—</span>}
            </div>
          </div>
        </div>

        <div className="side-panel">
          <div className="panel-box">
            <div className="panel-title">HOW THIS METHOD WORKS</div>
            <div style={{fontSize:10,color:'var(--tx2)',lineHeight:1.9}}>
              {algo==='bfs'?(<>
                <div style={{color:'var(--cyan)',fontFamily:"'Press Start 2P',cursive",fontSize:8,marginBottom:6}}>BFS — CLOSEST FIRST</div>
                <div style={{color:'var(--tx3)'}}>BFS visits every place that is 1 step away, then every place 2 steps away, and so on — like a ripple spreading outward.</div>
                <div style={{marginTop:8,color:'#ffdd00',fontWeight:'bold'}}>Best for: Finding the shortest route between two places.</div>
                <div style={{color:'var(--tx3)',marginTop:4}}>Uses a "waiting list" (queue) — first in, first visited.</div>
              </>):(<>
                <div style={{color:'#ff00cc',fontFamily:"'Press Start 2P',cursive",fontSize:8,marginBottom:6}}>DFS — DEEPEST FIRST</div>
                <div style={{color:'var(--tx3)'}}>DFS picks one path and follows it all the way to the end before trying another route — like exploring a cave by always going forward first.</div>
                <div style={{marginTop:8,color:'#ffdd00',fontWeight:'bold'}}>Best for: Exploring all possibilities, solving mazes.</div>
                <div style={{color:'var(--tx3)',marginTop:4}}>Uses a "stack" — last in, first visited.</div>
              </>)}
            </div>
          </div>

          <div className="panel-box">
            <div className="panel-title">{algo==='bfs'?'WAITING LIST (QUEUE)':'NEXT TO VISIT (STACK)'}</div>
            <div style={{fontSize:9,color:'var(--tx4)',marginBottom:4}}>The top item is visited next:</div>
            <div className="stack-panel">
              {cur?([...(algo==='bfs'?(cur.queue||[]):(cur.stack||[]))].reverse().map((id,i)=>(
                <div key={i} className="stack-item">Place {GNODES[id]?.label}</div>
              ))):(<div style={{color:'var(--tx4)',fontSize:10,padding:7}}>Press RUN to see the list...</div>)}
            </div>
          </div>

          <div className="panel-box">
            <div className="panel-title">COLOUR GUIDE</div>
            <div style={{fontSize:10,lineHeight:2.3}}>
              <div><span style={{color:'#ffdd00'}}>●</span> Your chosen start</div>
              <div><span style={{color:algo==='bfs'?'var(--cyan)':'#ff00cc'}}>●</span> Visiting right now</div>
              <div><span style={{color:'var(--green)'}}>●</span> Already visited</div>
              <div><span style={{color:'var(--tx3)'}}>●</span> Not yet visited</div>
              <div style={{color:'var(--tx4)',marginTop:4,fontSize:9}}>Click any circle to change your start point</div>
            </div>
          </div>

          <div className="panel-box">
            <div className="panel-title">PROGRESS</div>
            <div style={{fontSize:10,color:'var(--tx3)',lineHeight:2.1}}>
              <div>Places visited: <span style={{color:'var(--green)'}}>{cur?.visited?.size||0}</span> out of {GNODES.length}</div>
              <div>Step: <span style={{color:'#ffdd00'}}>{stepIdx<0?0:stepIdx+1}</span> of {steps.length||'—'}</div>
              <div>Starting from: <span style={{color:'var(--tx)'}}>{GNODES[startNode].label}</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────
function App(){
  const[theme,setTheme]=useState(()=>localStorage.getItem('aq_theme')||'dark');
  const[screen,setScreen]=useState('menu');
  const[levelKey,setLevelKey]=useState('medium');
  const[multiPlayers,setMultiPlayers]=useState(null);
  const[multiPlayerIdx,setMultiPlayerIdx]=useState(0);
  const[multiResults,setMultiResults]=useState([]);
  const[multiSnap,setMultiSnap]=useState(null);

  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);localStorage.setItem('aq_theme',theme);},[theme]);
  const toggleTheme=()=>setTheme(t=>t==='dark'?'light':'dark');

  const startMulti=(players)=>{const snap=generateMonsters(levelKey);setMultiSnap(snap);setMultiPlayers(players);setMultiPlayerIdx(0);setMultiResults([]);setScreen('sort');};
  const handlePlayerDone=(stars,swaps,time,timerOn)=>{
    const newRes=[...multiResults,{name:multiPlayers[multiPlayerIdx],stars,swaps,time,timerOn}];
    setMultiResults(newRes);
    if(multiPlayerIdx<multiPlayers.length-1){setMultiPlayerIdx(i=>i+1);}
    else{setScreen('multi-results');}
  };
  const quitMulti=()=>{setMultiPlayers(null);setMultiSnap(null);setMultiResults([]);setMultiPlayerIdx(0);setScreen('menu');};

  const penguinMode={sort:'sort',level:'sort',setup:'sort','multi-results':'sort',path:'path',bsearch:'bsearch',graph:'graph'}[screen]||'menu';

  const CurrentScreen=()=>{
    if(screen==='setup')         return <MultiSetup levelKey={levelKey} onStart={startMulti} onBack={()=>setScreen('level')}/>;
    if(screen==='multi-results') return <MultiResults results={multiResults} onPlayAgain={()=>{setMultiPlayerIdx(0);setMultiResults([]);setMultiSnap(generateMonsters(levelKey));setScreen('sort');}} onMenu={quitMulti}/>;
    if(screen==='sort'){
      if(multiPlayers) return <SortingGame key={`mp-${multiPlayerIdx}`} levelKey={levelKey} onBack={()=>setScreen('setup')} onMenu={quitMulti} initialMonsters={multiSnap} multiPlayers={multiPlayers} multiPlayerIdx={multiPlayerIdx} onPlayerDone={handlePlayerDone}/>;
      return <SortingGame levelKey={levelKey} onBack={()=>setScreen('level')} onMenu={()=>setScreen('menu')}/>;
    }
    if(screen==='level')   return <LevelSelect onSelect={k=>{setLevelKey(k);setScreen('sort');}} onMulti={k=>{setLevelKey(k);setScreen('setup');}} onBack={()=>setScreen('menu')}/>;
    if(screen==='path')    return <PathfindingGame onBack={()=>setScreen('menu')}/>;
    if(screen==='bsearch') return <BinarySearchGame onBack={()=>setScreen('menu')}/>;
    if(screen==='graph')   return <GraphGame onBack={()=>setScreen('menu')}/>;
    return <GameMenu onSelect={mode=>setScreen(mode==='sort'?'level':mode)}/>;
  };
  return <><CurrentScreen/><Penguin key={penguinMode} gameMode={penguinMode}/></>;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ThemeCtx.Provider value={{theme:document.documentElement.getAttribute('data-theme')||'dark',toggle:()=>{const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('aq_theme',t);}}}>
    <App/>
  </ThemeCtx.Provider>
);
</script>
</body>
</html>
